.quiz-section,.boss-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:20px 0}.boss-section{border-color:var(--warning)}.quiz-section h3,.boss-section h3{color:var(--heading);margin-bottom:16px;font-size:18px}.boss-sub{color:var(--warning);font-size:13px;margin-bottom:16px}.quiz-q{margin-bottom:20px}.quiz-q p{font-weight:600;font-size:16px;margin-bottom:10px;color:var(--heading)}.quiz-q label{display:block;padding:10px 16px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:5px;cursor:pointer;transition:all .15s;font-size:15px}.quiz-q label:hover{background:var(--neon-dim)}.quiz-q label.correct{background:rgba(52,211,153,.12);border-color:var(--success);color:var(--success)}.quiz-q label.wrong{background:rgba(248,113,113,.12);border-color:var(--danger);color:var(--danger)}.quiz-submit{background:var(--neon);color:var(--bg);border:none;padding:10px 24px;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);text-transform:uppercase;letter-spacing:.5px}.quiz-submit:disabled{opacity:.4;cursor:not-allowed}.quiz-result{padding:12px;border-radius:var(--radius);font-weight:600;font-size:15px;margin-top:12px;text-align:center}.quiz-result.pass{background:rgba(52,211,153,.1);color:var(--success)}.quiz-result.fail{background:rgba(248,113,113,.1);color:var(--danger)}.quiz-explanation{margin-top:6px;padding:8px 14px;border-radius:var(--radius);background:rgba(52,211,153,.06);border-left:3px solid var(--success);font-size:13px;color:var(--success);font-weight:600}

<script>

// === Audio (TTS) ===
const _synth=window.speechSynthesis,_LANG='de-DE';let _ttsOn=false,_ttsRate=1,_ttsUtterance=null,_ttsQueue=[];
function speakLesson(i){if(_ttsOn){stopTTS();return}const c=document.querySelectorAll('.lesson-card');if(!c[i]||!_synth)return;stopTTS();_ttsStartChunked(c[i].innerText,_LANG);showTTSBar()}
function speakText(t,lang){if(!_synth)return;stopTTS();_ttsStartChunked(t,lang||_LANG)}
function stopTTS(){_ttsQueue=[];if(_synth){_synth.cancel()}_ttsOn=false;updTTSUI()}
function updTTSUI(){document.querySelectorAll('.tts-btn').forEach(b=>b.classList.toggle('speaking',_ttsOn))}
function setTTSRate(r){_ttsRate=parseFloat(r)}
function _ttsChunkText(text,maxWords){const sentences=text.replace(/([.!?])\s+/g,'$1\n').split('\n');const chunks=[];let cur=[];let wc=0;for(const s of sentences){const words=s.trim().split(/\s+/);if(wc+words.length>maxWords&&cur.length>0){chunks.push(cur.join(' '));cur=[];wc=0}cur.push(s.trim());wc+=words.length}if(cur.length>0)chunks.push(cur.join(' '));return chunks}
function _ttsStartChunked(text,lang){_ttsQueue=_ttsChunkText(text,80);_ttsPlayNext(lang)}
function _ttsPlayNext(lang){if(_ttsQueue.length===0){_ttsOn=false;updTTSUI();return}_ttsUtterance=new SpeechSynthesisUtterance(_ttsQueue.shift());_ttsUtterance.lang=lang;_ttsUtterance.rate=_ttsRate;_ttsUtterance.onstart=()=>{_ttsOn=true;updTTSUI()};_ttsUtterance.onend=()=>{setTimeout(()=>{_ttsPlayNext(lang)},250)};_ttsUtterance.onerror=(e)=>{if(e.error&&e.error!=="interrupted"&&e.error!=="canceled"){_ttsOn=false;_ttsQueue=[];updTTSUI()}else{setTimeout(()=>{_ttsPlayNext(lang)},250)}};_synth.speak(_ttsUtterance)}
function showTTSBar(){if(document.getElementById('ttsBar'))return;const mc=document.getElementById('moduleContent');if(!mc)return;const b=document.createElement('div');b.className='tts-bar';b.id='ttsBar';b.innerHTML='\u{1F50A} <select onchange="setTTSRate(this.value)"><option value="0.7">Langsam</option><option value="1" selected>Normal</option><option value="1.3">Schnell</option></select> <button onclick="stopTTS()">\u25A0 Stopp</button>';mc.prepend(b)}

const _qk=[0x4A,0x7F,0x2B,0x61,0x5C,0x3E,0x18,0x73];function _d(h,i){return h^_qk[i%_qk.length]}
const LEVELS=[{name:'Einsteiger',xp:0},{name:'Grundlagen',xp:40},{name:'Anwender',xp:100},{name:'Fortgeschritten',xp:180},{name:'Analytiker',xp:280},{name:'Spezialist',xp:400},{name:'Stratege',xp:540},{name:'Experte',xp:700},{name:'Profi',xp:880},{name:'Meister',xp:1080},{name:'Veteran',xp:1300},{name:'Elite',xp:1540},{name:'Champion',xp:1800},{name:'Virtuose',xp:2080},{name:'Koryphäe',xp:2380},{name:'Autoritat',xp:2700},{name:'Mastermind',xp:3040},{name:'Kapazitat',xp:3400},{name:'Legende',xp:3780},{name:'Grandmaster',xp:4180}];
const BADGES=[{id:'m0',name:'Vorzeichen',icon:'\u00b1',desc:'Modul 1 abgeschlossen'},{id:'m1',name:'Terme',icon:'x',desc:'Modul 2 abgeschlossen'},{id:'m2',name:'Gleichungen',icon:'=',desc:'Modul 3 abgeschlossen'},{id:'m3',name:'Prozent',icon:'%',desc:'Modul 4 abgeschlossen'},{id:'m4',name:'Proportion',icon:'\u221d',desc:'Modul 5 abgeschlossen'},{id:'m5',name:'Fl\u00E4chen',icon:'\u25b3',desc:'Modul 6 abgeschlossen'},{id:'m6',name:'Volumen',icon:'\u25a1\u00b3',desc:'Modul 7 abgeschlossen'},{id:'m7',name:'Potenzen',icon:'n\u00b2',desc:'Modul 8 abgeschlossen'},{id:'m8',name:'Funktionen',icon:'f(x)',desc:'Modul 9 abgeschlossen'},{id:'m9',name:'Stochastik',icon:'P',desc:'Modul 10 abgeschlossen'},{id:'first_quiz',name:'Erster Test',icon:'?',desc:'Quiz bestanden'},{id:'perfect_quiz',name:'Fehlerfrei',icon:'\u2605',desc:'5/5 im Quiz'},{id:'first_boss',name:'Challenge',icon:'\u2713',desc:'Erste Challenge bestanden'},{id:'all_bosses',name:'Alle Challenges',icon:'\u2713\u2713',desc:'Alle 10 Challenges'},{id:'streak3',name:'3-Tage-Serie',icon:'3d',desc:'3 Tage hintereinander'},{id:'streak7',name:'Wochenserie',icon:'7d',desc:'7 Tage hintereinander'},{id:'half_done',name:'Halbzeit',icon:'50%',desc:'5 Module'},{id:'speed_quiz',name:'Speed-Run',icon:'<60s',desc:'Quiz unter 60 Sek.'},{id:'explorer',name:'Explorer',icon:'10/10',desc:'Alle Module angesehen'},{id:'graduate',name:'Abschluss',icon:'\u2606',desc:'Alle 10 Module abgeschlossen'}];

const modules=[
// M0: Negative Zahlen
{id:0,title:'Negative Zahlen',icon:'\u00b1',duration:'25 Min.',description:'Zahlen unter Null, Zahlengerade und Vorzeichen.',
lessons:[
{title:'Was sind negative Zahlen?',content:'<p><strong>Negative Zahlen</strong> sind kleiner als 0 und tragen ein Minus-Vorzeichen.</p><div class="info-box"><strong>Zahlenreihe:</strong> ..., \u22123, \u22122, \u22121, 0, 1, 2, 3, ...</div><p>Anwendungen: Temperatur (\u221210\u00b0C), Kontostand (\u221250\u20ac), Meerestiefe (\u2212200m).</p>'},
{title:'Rechenregeln',content:'<div class="info-box"><strong>Addition/Subtraktion:</strong><br>(\u22123) + 5 = 2<br>(\u22123) + (\u22122) = \u22125<br>(\u22123) \u2212 (\u22122) = \u22121</div><p><strong>Multiplikation/Division:</strong></p><ul><li>(+) \u00d7 (+) = (+)</li><li>(\u2212) \u00d7 (\u2212) = (+)</li><li>(+) \u00d7 (\u2212) = (\u2212)</li><li>(\u2212) \u00d7 (+) = (\u2212)</li></ul><p>Gleiches gilt f\u00fcr Division!</p><div class="info-box"><strong>Betrag</strong> (der Abstand einer Zahl von 0, immer positiv): |\u22127| = 7, |3| = 3</div>'}],
quiz:[{q:'(\u22125) + 3 = ?',a:['\u22128','\u22122','2','8'],_h:0x4B},{q:'(\u22123) \u00d7 (\u22124) = ?',a:['\u221212','\u22127','12','7'],_h:0x7D},{q:'Welche Zahl ist kleiner: \u22127 oder \u22123?',a:['\u22123','\u22127','Gleich','0'],_h:0x2A},{q:'0 \u2212 8 = ?',a:['8','\u22128','0','\u221280'],_h:0x60},{q:'(\u22126) + (\u22124) = ?',a:['\u221210','2','\u22122','10'],_h:0x5C}],
boss:[{q:'(\u22125) \u00d7 3 + 10 = ?',a:['25','\u221225','\u22125','5'],_h:0x48},{q:'|\u22127| = ?',a:['\u22127','7','0','49'],_h:0x7E},{q:'Ordne: \u22125, 3, \u22121, 0 (aufsteigend)',a:['\u22125, \u22121, 0, 3','0, \u22121, 3, \u22125','3, 0, \u22121, \u22125','\u22121, \u22125, 0, 3'],_h:0x2B}]},
// M1: Terme
{id:1,title:'Terme und Variablen',icon:'x',duration:'25 Min.',description:'Variablen, Terme aufstellen und vereinfachen.',
lessons:[
{title:'Variablen und Terme',content:'<p>Eine <strong>Variable</strong> ist ein Platzhalter (x, y, a). Ein <strong>Term</strong> ist ein Rechenausdruck: 3x + 2.</p><div class="info-box"><strong>Beispiele:</strong> 3x + 2, 4a \u2212 b, x\u00b2 + 1</div><p><strong>Koeffizient</strong> (die Zahl vor der Variable): In 3x ist 3 der Koeffizient, in 7y\u00b2 ist 7 der Koeffizient.</p>'},
{title:'Vereinfachen',content:'<div class="info-box"><strong>Gleichartige Glieder</strong> (Terme mit derselben Variable, z.B. 3x und 5x sind gleichartig, 3x und 2y nicht) <strong>zusammenfassen:</strong><br>3x + 5x = 8x<br>2a + 3b + a = 3a + 3b<br>2(x + 3) = 2x + 6 (Ausmultiplizieren)</div>'}],
quiz:[{q:'5x + 3x = ?',a:['15x','8x','53x','8'],_h:0x4B},{q:'2a + 3b + 4a vereinfacht:',a:['6a + 3b','9ab','6ab + 3','unver\u00e4ndert'],_h:0x7F},{q:'3(x + 2) = ?',a:['3x + 2','3x + 6','x + 6','6x'],_h:0x2A},{q:'F\u00fcr x = 4: 2x + 1 = ?',a:['7','9','6','10'],_h:0x60},{q:'\"Das Doppelte einer Zahl minus 3\" als Term:',a:['x + 2 \u2212 3','2 \u2212 3x','2x \u2212 3','x\u00b2 \u2212 3'],_h:0x5E}],
boss:[{q:'4(2x \u2212 1) + 3x = ?',a:['11x \u2212 4','8x + 3','11x \u2212 1','5x \u2212 4'],_h:0x4A},{q:'a = 3, b = 2: a\u00b2 + b = ?',a:['11','13','7','14'],_h:0x7F},{q:'2(x+1) ist gleichwertig mit:',a:['2x + 1','x + 2','2x + 2','2x\u00b2'],_h:0x29}]},
// M2: Gleichungen
{id:2,title:'Gleichungen l\u00f6sen',icon:'=',duration:'30 Min.',description:'\u00c4quivalenzumformungen — x isolieren.',
lessons:[
{title:'Gleichungen',content:'<p>Eine <strong>Gleichung</strong> hat ein = und eine Unbekannte. Ziel: x isolieren.</p><div class="info-box">x + 5 = 12 \u2192 x = 7</div>'},
{title:'\u00c4quivalenzumformungen',content:'<div class="info-box"><strong>\u00c4quivalenzumformung</strong> (eine erlaubte Umformung, die die L\u00f6sung nicht ver\u00e4ndert):<br>2x + 3 = 11<br>2x = 8 &nbsp; | \u22123<br>x = 4 &nbsp;&nbsp; | :2</div><p>Erlaubt: Auf beiden Seiten addieren, subtrahieren, multiplizieren, dividieren (nicht durch 0).</p><div class="info-box"><strong>Probe</strong> (Ergebnis in die Ausgangsgleichung einsetzen): x=4 \u2192 2\u00d74+3 = 11 \u2714</div>'}],
quiz:[{q:'x + 7 = 15. x = ?',a:['7','9','8','22'],_h:0x48},{q:'3x = 21. x = ?',a:['6','7','3','63'],_h:0x7E},{q:'2x \u2212 4 = 10. x = ?',a:['3','5','7','14'],_h:0x29},{q:'x/5 = 3. x = ?',a:['8','15','0,6','35'],_h:0x60},{q:'4x + 2 = 3x + 9. x = ?',a:['11','9','7','3'],_h:0x5E}],
boss:[{q:'5(x \u2212 2) = 3x + 4. x = ?',a:['5','6','7','8'],_h:0x48},{q:'\u22122x + 8 = 0. x = ?',a:['4','\u22124','8','2'],_h:0x7F},{q:'x/3 + 2 = 5. x = ?',a:['1','6','9','15'],_h:0x29}]},
// M3: Prozent
{id:3,title:'Prozentrechnung',icon:'%',duration:'25 Min.',description:'Grundwert, Prozentwert und Prozentsatz.',
lessons:[
{title:'Grundbegriffe',content:'<div class="info-box"><strong>Prozent</strong> = von Hundert<br>25% = 25/100 = 0,25</div><ul><li><strong>Grundwert (G)</strong>: Das Ganze</li><li><strong>Prozentwert (W)</strong>: Der Anteil</li><li><strong>Prozentsatz (p%)</strong>: Der Anteil in %</li></ul>'},
{title:'Formeln',content:'<div class="info-box"><strong>W = G \u00d7 p/100</strong><br><strong>p = W/G \u00d7 100</strong><br><strong>G = W \u00d7 100/p</strong></div><p>Beispiel: 20% von 150 = 150 \u00d7 0,20 = 30</p><div class="info-box"><strong>Vermehrter Grundwert:</strong> G \u00d7 (1 + p/100), z.B. 200\u20ac + 10% = 200 \u00d7 1,10 = 220\u20ac<br><strong>Verminderter Grundwert:</strong> G \u00d7 (1 \u2212 p/100), z.B. 80\u20ac \u2212 25% = 80 \u00d7 0,75 = 60\u20ac</div>'}],
quiz:[{q:'20% von 200 = ?',a:['20','40','60','80'],_h:0x4B},{q:'50% von 84 = ?',a:['42','44','34','168'],_h:0x7F},{q:'15 von 60 = wie viel %?',a:['15%','20%','25%','30%'],_h:0x29},{q:'80\u20ac, 25% Rabatt. Neuer Preis?',a:['55\u20ac','65\u20ac','60\u20ac','20\u20ac'],_h:0x63},{q:'100% von 50 = ?',a:['100','50','0','150'],_h:0x5D}],
boss:[{q:'200\u20ac + 10% Aufschlag = ?',a:['210\u20ac','220\u20ac','180\u20ac','202\u20ac'],_h:0x4B},{q:'72 ist 30% von welchem Grundwert?',a:['216','240','24','300'],_h:0x7E},{q:'100\u20ac, erst 20% dann 10% Rabatt. Endpreis?',a:['70\u20ac','72\u20ac','68\u20ac','75\u20ac'],_h:0x2A}]},
// M4: Proportionalität
{id:4,title:'Proportionalit\u00e4t',icon:'\u221d',duration:'25 Min.',description:'Dreisatz, direkte und indirekte Proportionalit\u00e4t.',
lessons:[
{title:'Direkte Proportionalit\u00e4t',content:'<div class="info-box"><strong>Direkte Proportionalit\u00e4t</strong> (je mehr, desto mehr): y = k \u00d7 x<br>Doppelte Menge = doppelter Preis</div><p>3 kg kosten 6\u20ac \u2192 6 kg kosten 12\u20ac</p><div class="info-box"><strong>Indirekte Proportionalit\u00e4t</strong> (je mehr, desto weniger): y = k / x<br>Doppelt so viele Arbeiter brauchen halb so lange</div>'},
{title:'Dreisatz',content:'<div class="info-box"><strong>Dreisatz (3 Schritte):</strong><br>1. Gegeben: 5 Br\u00f6tchen \u2192 3\u20ac<br>2. Auf 1 rechnen: 1 Br\u00f6tchen \u2192 0,60\u20ac<br>3. Auf Ziel rechnen: 8 Br\u00f6tchen \u2192 4,80\u20ac</div>'}],
quiz:[{q:'3 Shirts = 45\u20ac. 5 Shirts = ?',a:['60\u20ac','75\u20ac','90\u20ac','50\u20ac'],_h:0x4B},{q:'Direkt proportional: x \u00d72 \u2192 y ...',a:['halbiert','verdoppelt','bleibt gleich','vervierfacht'],_h:0x7E},{q:'2 Arbeiter = 6h. 6 Arbeiter = ?',a:['2h','18h','3h','1h'],_h:0x2B},{q:'y = 3x, x = 7. y = ?',a:['10','21','24','7'],_h:0x60},{q:'8L/100km. 250km = ?',a:['20L','25L','15L','16L'],_h:0x5C}],
boss:[{q:'Rezept 4 Pers.: 200g. 10 Pers. = ?',a:['400g','600g','500g','800g'],_h:0x48},{q:'Mehr Arbeiter \u2192 ... (indirekt prop.)',a:['mehr Zeit','weniger Zeit','gleiche Zeit','doppelte Zeit'],_h:0x7E},{q:'12 Stifte = 9,60\u20ac. St\u00fcckpreis?',a:['0,60\u20ac','0,80\u20ac','0,90\u20ac','1,20\u20ac'],_h:0x2A}]},
// M5: Flächen
{id:5,title:'Fl\u00e4chenberechnung',icon:'\u25b3',duration:'25 Min.',description:'Rechteck, Dreieck, Kreis, Parallelogramm.',
lessons:[
{title:'Grundformen',content:'<div class="info-box"><strong>Rechteck:</strong> A (Fl\u00e4cheninhalt) = a \u00d7 b<br><strong>Quadrat:</strong> A = a\u00b2<br><strong>Dreieck:</strong> A = g (Grundseite) \u00d7 h (H\u00f6he, senkrecht zur Grundseite) / 2<br><strong>Kreis:</strong> A = \u03c0r\u00b2 mit r (Radius, Abstand Mittelpunkt zum Rand)</div><p>Einheiten: cm\u00b2, m\u00b2, km\u00b2 usw.</p>'},
{title:'Zusammengesetzte Fl\u00e4chen',content:'<div class="info-box"><strong>Parallelogramm:</strong> A = a \u00d7 h<br><strong>Trapez:</strong> A = (a+c)/2 \u00d7 h, wobei a und c die parallelen Seiten sind</div><p>Kreisfl\u00e4che r=5: A = \u03c0 \u00d7 25 \u2248 78,5 cm\u00b2</p>'}],
quiz:[{q:'Rechteck 8\u00d75 = ?',a:['13','40','26','80'],_h:0x4B},{q:'Dreieck g=10, h=6. A = ?',a:['60','30','16','80'],_h:0x7E},{q:'Quadrat a=7. A = ?',a:['14','28','49','21'],_h:0x29},{q:'Kreis r=3 (\u03c0\u22483,14). A \u2248 ?',a:['9,42','18,84','28,26','6,28'],_h:0x63},{q:'Fl\u00e4cheneinheit?',a:['cm','cm\u00b2','cm\u00b3','m'],_h:0x5D}],

const SK='algebrameister_progress';
let state={name:'',started:false,currentModule:0,xp:0,level:0,streak:0,lastVisit:null,modulesCompleted:[],quizResults:{},bossResults:{},badges:[],quizShuffleMap:{},modulesViewed:[],interactiveResults:{},designTheme:'cyber-dark'};
function saveState(){try{localStorage.setItem(SK,JSON.stringify(state))}catch(e){}}
function loadState(){try{const s=localStorage.getItem(SK);if(s){Object.assign(state,JSON.parse(s));return true}}catch(e){}return false}
function exportData(){const a=document.createElement('a');a.download='algebrameister-'+state.name+'.json';a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.click()}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{Object.assign(state,JSON.parse(ev.target.result));saveState();location.reload()}catch(err){alert('Fehler')}};r.readAsText(f)}
function getLevel(xp){let l=0;for(let i=LEVELS.length-1;i>=0;i--)if(xp>=LEVELS[i].xp){l=i;break}return l}
function getLevelProgress(xp){const l=getLevel(xp),c=LEVELS[l].xp,n=l<LEVELS.length-1?LEVELS[l+1].xp:c;return n===c?100:Math.min(100,Math.round((xp-c)/(n-c)*100))}
function addXP(a,r){const o=getLevel(state.xp);state.xp+=a;const n=getLevel(state.xp);saveState();updateUI();showNotif('xp','+'+a+' XP',r);if(n>o){state.level=n;saveState();setTimeout(()=>showLevelUp(n),600)}}
function updateStreak(){const t=new Date().toDateString();if(state.lastVisit===t)return;const y=new Date(Date.now()-864e5).toDateString();if(state.lastVisit===y){state.streak++;showNotif('streak',state.streak+'-Tage-Serie','');if(state.streak>=3)awardBadge('streak3');if(state.streak>=7)awardBadge('streak7')}else state.streak=1;state.lastVisit=t;saveState()}
function awardBadge(id){if(state.badges.includes(id))return;state.badges.push(id);saveState();const b=BADGES.find(x=>x.id===id);if(b)showNotif('badge','Achievement: '+b.name,b.desc)}
let nQ=[],nA=false;function showNotif(t,ti,tx){nQ.push({type:t,title:ti,text:tx});if(!nA)procN()}function procN(){if(!nQ.length){nA=false;return}nA=true;const{type,title,text}=nQ.shift();const el=document.getElementById('notif');el.className='notif '+type;document.getElementById('notifTitle').textContent=title;document.getElementById('notifText').textContent=text;el.classList.add('show');setTimeout(()=>{el.classList.remove('show');setTimeout(procN,300)},2200)}
function showLevelUp(l){const o=document.getElementById('levelUpOverlay');document.getElementById('levelUpBox').innerHTML='<div class="lvl-icon">\u2191</div><div class="lvl-title">Level Up</div><div class="lvl-name">Rang '+(l+1)+': '+LEVELS[l].name+'</div>';o.classList.add('active');setTimeout(()=>o.classList.remove('active'),2500)}
function shuffleQuiz(m,q){const k='m'+m;if(state.quizShuffleMap[k])return state.quizShuffleMap[k];const idx=[...Array(q.length).keys()];for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]]}state.quizShuffleMap[k]=idx;saveState();return idx}
function renderQuiz(mi,quiz,boss){const pf=boss?'boss':'quiz';const idx=boss?[...Array(quiz.length).keys()]:shuffleQuiz(mi,quiz);let h='<div class="'+(boss?'boss-section':'quiz-section')+'">';h+=boss?'<h3>Challenge</h3><p class="boss-sub">Alle '+quiz.length+' Fragen korrekt beantworten.</p>':'<h3>Quiz</h3>';idx.forEach((qi,di)=>{const q=quiz[qi];h+='<div class="quiz-q" data-qi="'+qi+'"><p>'+(di+1)+'. '+q.q+'</p>';q.a.forEach((a,ai)=>{h+='<label><input type="radio" name="'+pf+'_'+mi+'_'+qi+'" value="'+ai+'"> '+a+'</label>'});h+='</div>'});h+='<button class="quiz-submit" onclick="checkQuiz('+mi+','+boss+')">'+(boss?'Absenden':'Auswerten')+'</button><div class="quiz-result" id="'+pf+'Result'+mi+'" style="display:none"></div></div>';return h}
function checkQuiz(mi,boss){const pf=boss?'boss':'quiz';const quiz=boss?modules[mi].boss:modules[mi].quiz;let cor=0;const tot=quiz.length;quiz.forEach((q,qi)=>{const sel=document.querySelector('input[name="'+pf+'_'+mi+'_'+qi+'"]:checked');const labs=document.querySelectorAll('[data-qi="'+qi+'"] label');const ci=_d(q._h,qi);labs.forEach((l,li)=>{l.classList.remove('correct','wrong');if(li===ci)l.classList.add('correct');else if(sel&&+sel.value===li)l.classList.add('wrong')});const qDiv=labs[0]?.closest('.quiz-q');if(qDiv){const old=qDiv.querySelector('.quiz-explanation');if(old)old.remove()}if(!sel||+sel.value!==ci){if(qDiv){const exp=document.createElement('div');exp.className='quiz-explanation';exp.textContent='\u2192 Richtige Antwort: '+q.a[ci];qDiv.appendChild(exp)}}if(sel&&+sel.value===ci)cor++});const r=document.getElementById(pf+'Result'+mi);r.style.display='block';if(boss){if(cor===tot){r.className='quiz-result pass';r.textContent='Challenge bestanden \u2014 '+cor+'/'+tot;if(!state.bossResults[mi]){state.bossResults[mi]=true;addXP(100,'Challenge bestanden');if(!state.badges.includes('first_boss'))awardBadge('first_boss');if(modules.every((_,i)=>state.bossResults[i]))awardBadge('all_bosses');checkMC(mi)}}else{r.className='quiz-result fail';r.textContent=cor+'/'+tot+' \u2014 Alle m\u00FCssen korrekt sein.';setTimeout(()=>{document.querySelectorAll('input[name^="'+pf+'_'+mi+'"]').forEach(x=>{x.disabled=false;x.checked=false});document.querySelectorAll('[data-qi] label').forEach(l=>l.classList.remove('correct','wrong'));document.querySelectorAll('.quiz-explanation').forEach(e=>e.remove());r.style.display='none'},2000);return}}else{const ok=cor>=Math.ceil(tot*.6);r.className='quiz-result '+(ok?'pass':'fail');r.textContent=ok?cor+'/'+tot+' \u2014 Bestanden.':cor+'/'+tot+' \u2014 Mindestens '+Math.ceil(tot*.6)+' korrekte Antworten n\u00f6tig.';if(ok&&!state.quizResults[mi]){state.quizResults[mi]=cor;addXP(cor*15+50,'Quiz bestanden');if(!state.badges.includes('first_quiz'))awardBadge('first_quiz');if(cor===tot)awardBadge('perfect_quiz');if(Date.now()-(window._qS||Date.now())<6e4)awardBadge('speed_quiz');checkMC(mi)}}saveState();document.querySelectorAll('input[name^="'+pf+'_'+mi+'"]').forEach(x=>x.disabled=true);window.scrollTo({top:0,behavior:'smooth'})}
function checkMC(m){if(state.quizResults[m]!==undefined&&state.bossResults[m]&&!state.modulesCompleted.includes(m)){state.modulesCompleted.push(m);awardBadge('m'+m);if(state.modulesCompleted.length>=5)awardBadge('half_done');if(state.modulesCompleted.length>=10){awardBadge('graduate');setTimeout(()=>showCert(),1500)}saveState();renderSidebar()}}
function renderModule(m){state.currentModule=m;if(!state.modulesViewed.includes(m)){state.modulesViewed.push(m);addXP(10,'Modul geöffnet');if(state.modulesViewed.length>=10)awardBadge('explorer')}saveState();closeSidebar();const mod=modules[m];let h='<div class="module-header"><div class="mod-badge">Modul '+(m+1)+' \u00b7 '+mod.icon+'</div><h1>'+mod.title+'</h1><p class="mod-desc">'+mod.description+'</p></div>';mod.lessons.forEach((l,i)=>{h+='<div class="lesson-card"><h3><span style="color:var(--neon)">'+String(i+1).padStart(2,'0')+'</span> '+l.title+' <button class="tts-btn" onclick="speakLesson('+i+')" title="Vorlesen">&#128266;</button></h3>'+l.content+'</div>'});h+='<div class="interactive-area"><h4>Interaktive \u00DCbung</h4><div id="interactiveContent"></div></div>';window._qS=Date.now();h+=renderQuiz(m,mod.quiz,false);h+=renderQuiz(m,mod.boss,true);h+='<div class="site-footer">AlgebraMeister &copy; 2026 GZ AI Stacks \u00b7 Gerd Zimmermann</div>';document.getElementById('welcomeScreen').style.display='none';document.getElementById('badgesView').style.display='none';document.getElementById('statsView').style.display='none';const mc=document.getElementById('moduleContent');mc.style.display='block';mc.innerHTML=h;renderSidebar();setTimeout(()=>{initIx(m);window.scrollTo(0,0)},100)}
function renderSidebar(){document.getElementById('sidebarModules').innerHTML=modules.map((m,i)=>{const d=state.modulesCompleted.includes(i),a=state.currentModule===i&&document.getElementById('moduleContent').style.display==='block';return '<div class="sidebar-item'+(a?' active':'')+(d?' completed':'')+'" onclick="renderModule('+i+')">'+m.icon+' '+m.title+'</div>'}).join('')}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}function closeSidebar(){document.getElementById('sidebar').classList.remove('open')}
function showBadges(){document.getElementById('welcomeScreen').style.display='none';document.getElementById('moduleContent').style.display='none';document.getElementById('statsView').style.display='none';const v=document.getElementById('badgesView');v.style.display='block';closeSidebar();let h='<div class="module-header"><h1>Achievements</h1><p class="mod-desc">'+state.badges.length+' / '+BADGES.length+' freigeschaltet</p></div><div class="badges-grid">';BADGES.forEach(b=>{const e=state.badges.includes(b.id);h+='<div class="badge-card'+(e?' earned':' locked')+'"><div class="badge-icon" style="font-family:var(--mono);font-weight:700">'+(e?b.icon:'\u2014')+'</div><div class="badge-name">'+b.name+'</div><div class="badge-desc">'+b.desc+'</div></div>'});v.innerHTML=h+'</div>'}
function showStats(){document.getElementById('welcomeScreen').style.display='none';document.getElementById('moduleContent').style.display='none';document.getElementById('badgesView').style.display='none';const v=document.getElementById('statsView');v.style.display='block';closeSidebar();const l=getLevel(state.xp);v.innerHTML='<div class="module-header"><h1>Statistik</h1></div><div class="stats-grid"><div class="stat-card"><div class="stat-val">'+state.xp+'</div><div class="stat-label">XP</div></div><div class="stat-card"><div class="stat-val">'+LEVELS[l].name+'</div><div class="stat-label">Rang</div></div><div class="stat-card"><div class="stat-val">'+state.modulesCompleted.length+'/10</div><div class="stat-label">Module</div></div><div class="stat-card"><div class="stat-val">'+Object.keys(state.quizResults).length+'</div><div class="stat-label">Quizze</div></div><div class="stat-card"><div class="stat-val">'+Object.keys(state.bossResults).length+'</div><div class="stat-label">Challenges</div></div><div class="stat-card"><div class="stat-val">'+state.badges.length+'</div><div class="stat-label">Achievements</div></div><div class="stat-card"><div class="stat-val">'+state.streak+'d</div><div class="stat-label">Serie</div></div></div>'}
let certStyle='modern';function showCert(){window._lastFocus=document.activeElement;document.getElementById('certOverlay').classList.add('active');document.getElementById('certPicker').innerHTML=['Modern','Klassisch','Tech','Minimal'].map((l,i)=>{const s=['modern','klassisch','tech','minimal'][i];return '<button class="'+(certStyle===s?'active':'')+'" onclick="certStyle=\''+s+'\';showCert()">'+l+'</button>'}).join('');renderCert()}

function renderCert(){const f=document.getElementById('certFrame'),l=getLevel(state.xp),nm=state.name||'?',dt=new Date().toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'}),cd='AM-'+new Date().getFullYear()+'-'+((nm.charCodeAt(0)*7+state.xp)%9999).toString(16).toUpperCase().padStart(4,'0'),st={modern:{bg:'linear-gradient(135deg,#1a1a3e,#0d0d2b)',bd:'#818cf8',tx:'#e0e0ff',sb:'#8888cc',ac:'#a5b4fc'},klassisch:{bg:'linear-gradient(135deg,#fdf8ee,#f5edda)',bd:'#c5a54e',tx:'#1a1a3e',sb:'#5c5040',ac:'#b8860b'},tech:{bg:'linear-gradient(135deg,#0a0a0a,#111)',bd:'#4ade80',tx:'#d0f0d0',sb:'#5a8a5a',ac:'#4ade80'},minimal:{bg:'#fff',bd:'#333',tx:'#111',sb:'#666',ac:'#333'}},s=st[certStyle];f.innerHTML='<div style="background:'+s.bg+';padding:48px 40px;border:2px solid '+s.bd+';border-radius:8px;text-align:center;min-height:500px;color:'+s.tx+'"><div style="font-size:12px;color:'+s.sb+';letter-spacing:4px;text-transform:uppercase">AlgebraMeister \u00b7 Mathematik Kl. 7-9</div><h1 style="font-size:40px;margin:20px 0;font-family:Georgia,serif;letter-spacing:-1px">Zertifikat</h1><div style="width:80px;height:1px;background:'+s.bd+';margin:0 auto 28px;opacity:.4"></div><p style="font-size:16px;color:'+s.sb+'">Hiermit wird bescheinigt, dass</p><h2 style="font-size:36px;color:'+s.ac+';margin:14px 0;font-family:Georgia,serif">'+nm+'</h2><p style="font-size:18px;font-weight:600;margin:16px 0">Rang: '+LEVELS[l].name+'</p><p style="font-size:14px;color:'+s.sb+'">das Programm AlgebraMeister erfolgreich absolviert hat.</p><div style="font-size:14px;margin:28px 0">Module: '+state.modulesCompleted.length+'/10 \u00b7 XP: '+state.xp+' \u00b7 Achievements: '+state.badges.length+'</div><div style="font-size:13px;color:'+s.sb+';margin-top:28px">'+dt+'</div><div style="font-size:10px;color:'+s.sb+';opacity:.4;margin-top:6px">'+cd+' \u00b7 GZ AI STACKS</div></div>'}

function setDesignTheme(w,m){state.designTheme=w+'-'+m;document.documentElement.setAttribute('data-theme',state.designTheme);saveState();const t=TC[w];if(t){document.getElementById('heroIcon').textContent=t.icon;document.getElementById('welcomeTitle').textContent=t.title;document.getElementById('welcomeSub').textContent=t.sub;document.getElementById('startBtn').textContent=t.btn}buildTP()}

<script>
(function(){
var KEY=null;
var scripts=document.querySelectorAll('script');
for(var i=0;i<scripts.length;i++){
var km=scripts[i].textContent.match(/STORAGE_KEY\s*=\s*['"](\w+)['"]/);
if(km){KEY=km[1];break;}
}
if(!location.hash.match(/modules=/)){try{Object.keys(localStorage).filter(function(k){return k.indexOf("_allowed_modules")!==-1}).forEach(function(k){localStorage.removeItem(k)})}catch(e){}}
var LOCK_KEY=(KEY||'app')+'_allowed_modules';
var h=location.hash.match(/modules=([0-9,]+)/);
var allowed=null;
if(h){
allowed=h[1].split(",").map(Number);
try{localStorage.setItem(LOCK_KEY,JSON.stringify(allowed));}catch(e){}
}else{
try{var stored=localStorage.getItem(LOCK_KEY);if(stored)allowed=JSON.parse(stored);}catch(e){}
}
if(!allowed||!allowed.length)return;
function filterSidebar(){
var items=document.querySelectorAll("#sidebarModules > *");
for(var i=0;i<items.length;i++){
items[i].style.display=(allowed.indexOf(i)===-1)?"none":"";
}
}
var sb=document.getElementById("sidebarModules");
if(sb){new MutationObserver(filterSidebar).observe(sb,{childList:true});filterSidebar();}
document.addEventListener("click",function(e){
var t=e.target.closest("[onclick]");
if(!t)return;
var oc=t.getAttribute("onclick")||"";
var idx=oc.indexOf("renderModule(");
if(idx===-1)return;
var num=parseInt(oc.substring(idx+13));
if(!isNaN(num)&&allowed.indexOf(num)===-1){e.preventDefault();e.stopImmediatePropagation();}
},true);
setTimeout(filterSidebar,500);
window.addEventListener("hashchange",function(){
var hh=location.hash.match(/modules=([0-9,]+)/);
if(hh){
allowed=hh[1].split(",").map(Number);
try{localStorage.setItem(LOCK_KEY,JSON.stringify(allowed));}catch(e){}
filterSidebar();
}
});
})();
</script>

<div class="zoom-controls" role="toolbar" aria-label="Zoom-Steuerung">
<button class="zoom-btn" onclick="zoomOut()" title="Verkleinern (Taste -)" aria-label="Verkleinern">&#8722;</button>
<button class="zoom-btn" onclick="zoomReset()" title="Zoom zurücksetzen" aria-label="Zoom zurücksetzen" style="font-size:10px;position:relative"><span id="zoomLvl">100%</span></button>
<button class="zoom-btn" onclick="zoomIn()" title="Vergrößern (Taste +)" aria-label="Vergrößern">+</button>
</div>

<script>
(function(){
var zl=100;
function applyZoom(){document.documentElement.style.fontSize=zl+'%';var e=document.getElementById('zoomLvl');if(e)e.textContent=zl+'%';}
window.zoomIn=function(){if(zl<200){zl+=10;applyZoom();}};
window.zoomOut=function(){if(zl>50){zl-=10;applyZoom();}};
window.zoomReset=function(){zl=100;applyZoom();};
document.addEventListener('keydown',function(e){
if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
if((e.key==='+'||e.key==='=')&&!e.ctrlKey&&!e.metaKey){e.preventDefault();zoomIn();}
else if((e.key==='-'||e.key==='_')&&!e.ctrlKey&&!e.metaKey){e.preventDefault();zoomOut();}
else if(e.key==='0'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();zoomReset();}
});
})();
</script>

<script>
/* A11y: Focus trap for modal overlays */
document.addEventListener('keydown',function(e){if(e.key==='Tab'){var ov=document.querySelector('.cert-overlay.active,.modal-overlay.active,[role="dialog"].active');if(ov){var fc=ov.querySelectorAll('button,a,[tabindex="0"],input,select,textarea');if(fc.length){var f=fc[0],l=fc[fc.length-1];if(e.shiftKey&&document.activeElement===f){e.preventDefault();l.focus()}else if(!e.shiftKey&&document.activeElement===l){e.preventDefault();f.focus()}}}}});
</script>
