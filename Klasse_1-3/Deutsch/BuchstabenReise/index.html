<!DOCTYPE html>
<html lang="de" data-theme="wald-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BuchstabenReise — Lese- & Schreibabenteuer</title>
<meta name="description" content="Interaktive Lern-App für Klasse 1-2: Buchstaben, Silben und erste Wörter — offline und mit Spaß!">
<style>
/* ═══ Reset ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══ Theme: Zauberwald ═══ */
[data-theme="wald-dark"]{
  --bg:#0c1a0f;--bg2:#132818;--bg3:#1a3520;--card:#15291a;
  --text:#d4e8d4;--text-dim:#8aab8a;--heading:#e8f5e9;
  --neon:#4ade80;--neon-dim:rgba(74,222,128,.12);--neon-glow:0 0 20px rgba(74,222,128,.25);
  --link:#66bb6a;--border:rgba(74,222,128,.15);
  --success:#4ade80;--warning:#fbbf24;--danger:#f87171;
  --xp-purple:#a78bfa;--badge-cyan:#22d3ee;--streak-red:#f87171;
  --radius:20px;--shadow:0 4px 24px rgba(0,0,0,.3);
  --font:'Segoe UI',system-ui,sans-serif;--mono:'Courier New',monospace;--serif:Georgia,serif;
}
[data-theme="wald-light"]{
  --bg:#f1f8e9;--bg2:#e8f5e9;--bg3:#c8e6c9;--card:#fff;
  --text:#2e4a2e;--text-dim:#5a7a5a;--heading:#1b5e20;
  --neon:#2e7d32;--neon-dim:rgba(46,125,50,.08);--neon-glow:0 0 12px rgba(46,125,50,.15);
  --link:#388e3c;--border:rgba(46,125,50,.15);
  --success:#2e7d32;--warning:#f59e0b;--danger:#dc2626;
  --xp-purple:#7c3aed;--badge-cyan:#0891b2;--streak-red:#dc2626;
  --radius:20px;--shadow:0 4px 24px rgba(0,0,0,.08);
  --font:'Segoe UI',system-ui,sans-serif;--mono:'Courier New',monospace;--serif:Georgia,serif;
}

/* ═══ Theme: Ozean ═══ */
[data-theme="ozean-dark"]{
  --bg:#0a1628;--bg2:#0f1e38;--bg3:#132848;--card:#132040;
  --text:#c8e0f8;--text-dim:#6a9cc8;--heading:#e0f2fe;
  --neon:#38bdf8;--neon-dim:rgba(56,189,248,.12);--neon-glow:0 0 20px rgba(56,189,248,.25);
  --link:#0ea5e9;--border:rgba(56,189,248,.15);
  --success:#22d3ee;--warning:#fbbf24;--danger:#f87171;
  --xp-purple:#a78bfa;--badge-cyan:#22d3ee;--streak-red:#f87171;
  --radius:16px;--shadow:0 4px 24px rgba(0,0,0,.35);
  --font:'Segoe UI',system-ui,sans-serif;--mono:'Courier New',monospace;--serif:Georgia,serif;
}
[data-theme="ozean-light"]{
  --bg:#f0f9ff;--bg2:#e0f2fe;--bg3:#bae6fd;--card:#fff;
  --text:#0c4a6e;--text-dim:#4a8ab0;--heading:#0c4a6e;
  --neon:#0284c7;--neon-dim:rgba(2,132,199,.08);--neon-glow:0 0 12px rgba(2,132,199,.15);
  --link:#0369a1;--border:rgba(2,132,199,.15);
  --success:#0891b2;--warning:#f59e0b;--danger:#dc2626;
  --xp-purple:#7c3aed;--badge-cyan:#0891b2;--streak-red:#dc2626;
  --radius:16px;--shadow:0 4px 24px rgba(0,0,0,.06);
  --font:'Segoe UI',system-ui,sans-serif;--mono:'Courier New',monospace;--serif:Georgia,serif;
}

/* ═══ Theme: Weltraum ═══ */
[data-theme="space-dark"]{
  --bg:#07020e;--bg2:#0e0620;--bg3:#150a30;--card:#110a28;
  --text:#d8d0f0;--text-dim:#8a7cb8;--heading:#f0e8ff;
  --neon:#c084fc;--neon-dim:rgba(192,132,252,.12);--neon-glow:0 0 20px rgba(192,132,252,.25);
  --link:#a855f7;--border:rgba(192,132,252,.15);
  --success:#a78bfa;--warning:#fbbf24;--danger:#f87171;
  --xp-purple:#c084fc;--badge-cyan:#22d3ee;--streak-red:#f87171;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
  --font:'Segoe UI',system-ui,sans-serif;--mono:'Courier New',monospace;--serif:Georgia,serif;
}
[data-theme="space-light"]{
  --bg:#faf5ff;--bg2:#f3e8ff;--bg3:#e9d5ff;--card:#fff;
  --text:#2e1065;--text-dim:#7c5aad;--heading:#2e1065;
  --neon:#7c3aed;--neon-dim:rgba(124,58,237,.08);--neon-glow:0 0 12px rgba(124,58,237,.15);
  --link:#6d28d9;--border:rgba(124,58,237,.15);
  --success:#7c3aed;--warning:#f59e0b;--danger:#dc2626;
  --xp-purple:#7c3aed;--badge-cyan:#0891b2;--streak-red:#dc2626;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.06);
  --font:'Segoe UI',system-ui,sans-serif;--mono:'Courier New',monospace;--serif:Georgia,serif;
}

/* ═══ Theme: Süßigkeiten ═══ */
[data-theme="candy-dark"]{
  --bg:#1a1a2e;--bg2:#222244;--bg3:#2a2a55;--card:#262650;
  --text:#f0dde8;--text-dim:#b088a0;--heading:#fff;
  --neon:#ff6b9d;--neon-dim:rgba(255,107,157,.12);--neon-glow:0 0 20px rgba(255,107,157,.25);
  --link:#f472b6;--border:rgba(255,107,157,.15);
  --success:#f472b6;--warning:#fbbf24;--danger:#f87171;
  --xp-purple:#c084fc;--badge-cyan:#22d3ee;--streak-red:#f87171;
  --radius:24px;--shadow:0 4px 24px rgba(0,0,0,.3);
  --font:'Comic Sans MS','Chalkboard SE',cursive,system-ui;--mono:'Courier New',monospace;--serif:Georgia,serif;
}
[data-theme="candy-light"]{
  --bg:#fff0f6;--bg2:#fce7f3;--bg3:#fbcfe8;--card:#fff;
  --text:#831843;--text-dim:#a0547a;--heading:#831843;
  --neon:#ec4899;--neon-dim:rgba(236,72,153,.08);--neon-glow:0 0 12px rgba(236,72,153,.15);
  --link:#db2777;--border:rgba(236,72,153,.15);
  --success:#ec4899;--warning:#f59e0b;--danger:#dc2626;
  --xp-purple:#7c3aed;--badge-cyan:#0891b2;--streak-red:#dc2626;
  --radius:24px;--shadow:0 4px 24px rgba(0,0,0,.06);
  --font:'Comic Sans MS','Chalkboard SE',cursive,system-ui;--mono:'Courier New',monospace;--serif:Georgia,serif;
}

/* ═══ Base Layout ═══ */
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:17px;line-height:1.7;min-height:100vh;transition:background .3s,color .3s}
a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}
.skip-nav{position:absolute;top:-50px;left:8px;background:var(--neon);color:var(--bg);padding:8px 16px;z-index:9999;border-radius:0 0 8px 8px;font-weight:700}
.skip-nav:focus{top:0}

/* ═══ Header ═══ */
.header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(12px)}
.header .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;color:var(--heading)}
.header .logo svg{width:32px;height:32px}
.header .xp-bar{flex:1;max-width:260px;margin-left:auto}
.header .xp-label{font-size:12px;color:var(--text-dim);display:flex;justify-content:space-between;font-weight:600}
.header .xp-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:2px}
.header .xp-fill{height:100%;background:var(--neon);border-radius:4px;transition:width .5s}
.hamburger{display:none;background:none;border:2px solid var(--border);color:var(--text);font-size:22px;padding:4px 10px;border-radius:var(--radius);cursor:pointer}
@media(max-width:800px){.hamburger{display:block}}

/* ═══ Sidebar ═══ */
.sidebar{position:fixed;top:54px;left:0;width:280px;height:calc(100vh - 54px);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:16px;z-index:90;transition:transform .3s}
.sidebar h3{font-size:14px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text);font-size:15px;transition:background .2s;margin-bottom:4px;border:1px solid transparent}
.sidebar-item:hover{background:var(--neon-dim);border-color:var(--border)}
.sidebar-item.active{background:var(--neon-dim);border-color:var(--neon);color:var(--neon);font-weight:700}
.sidebar-item.completed::after{content:'✓';margin-left:auto;color:var(--success);font-weight:700}
.sidebar-link{display:block;padding:10px 12px;border-radius:var(--radius);color:var(--text-dim);font-size:14px;cursor:pointer;transition:background .2s;margin-bottom:2px}
.sidebar-link:hover{background:var(--neon-dim);color:var(--text)}
@media(max-width:800px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}

/* ═══ Main Content ═══ */
.main{margin-left:280px;padding:32px;max-width:860px}
@media(max-width:800px){.main{margin-left:0;padding:16px}}

/* ═══ Welcome Screen ═══ */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px 20px}
.welcome .hero-emoji{font-size:80px;margin-bottom:16px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.welcome h1{font-size:clamp(32px,6vw,52px);color:var(--heading);margin-bottom:8px}
.welcome .sub{font-size:clamp(16px,3vw,20px);color:var(--text-dim);margin-bottom:32px;max-width:500px}
.welcome input{font-size:20px;padding:14px 24px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg2);color:var(--text);text-align:center;width:min(340px,90%);outline:none;font-family:var(--font);transition:border-color .3s}
.welcome input:focus{border-color:var(--neon)}
.welcome .start-btn{margin-top:20px;padding:16px 48px;font-size:20px;font-weight:700;border-radius:var(--radius);border:none;background:var(--neon);color:var(--bg);cursor:pointer;font-family:var(--font);transition:transform .2s,box-shadow .2s}
.welcome .start-btn:hover{transform:scale(1.05);box-shadow:var(--neon-glow)}
.welcome .start-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ═══ Theme Picker ═══ */
.theme-picker{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.theme-btn{width:44px;height:44px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .2s,border-color .2s;position:relative}
.theme-btn:hover{transform:scale(1.15)}
.theme-btn.active{border-color:var(--heading);transform:scale(1.15)}
.mode-toggle{background:var(--bg3);border:2px solid var(--border);color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:18px;transition:all .2s;margin-left:8px}
.mode-toggle:hover{border-color:var(--neon)}

/* ═══ Module Content ═══ */
.module-header{text-align:center;margin-bottom:32px}
.module-header .mod-badge{display:inline-block;background:var(--neon-dim);border:1px solid var(--border);color:var(--neon);padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;margin-bottom:12px}
.module-header h1{color:var(--heading);font-size:clamp(24px,4vw,36px)}
.module-header .mod-desc{color:var(--text-dim);margin-top:8px;font-size:16px}
.lesson-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;margin-bottom:20px;box-shadow:var(--shadow)}
.lesson-card h3{color:var(--heading);font-size:20px;margin-bottom:12px}
.lesson-card p,.lesson-card li{font-size:17px;line-height:1.8;margin-bottom:8px}
.lesson-card .info-box{background:var(--neon-dim);border-left:4px solid var(--neon);padding:14px 18px;border-radius:0 var(--radius) var(--radius) 0;margin:16px 0;font-size:16px}
.lesson-card ul,.lesson-card ol{padding-left:24px;margin:12px 0}

/* ═══ Interactive Area ═══ */
.interactive-area{background:var(--card);border:2px solid var(--neon);border-radius:var(--radius);padding:24px;margin:24px 0;box-shadow:var(--neon-glow)}
.interactive-area h4{color:var(--neon);font-size:18px;margin-bottom:16px}
#interactiveContent{min-height:100px}
.ix-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:16px 0}
.ix-item{background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);padding:14px 20px;font-size:20px;cursor:pointer;transition:all .2s;user-select:none;text-align:center;min-width:60px}
.ix-item:hover{border-color:var(--neon);background:var(--neon-dim)}
.ix-item.selected{border-color:var(--neon);background:var(--neon-dim);box-shadow:var(--neon-glow)}
.ix-item.correct{border-color:var(--success);background:rgba(74,222,128,.15);color:var(--success)}
.ix-item.wrong{border-color:var(--danger);background:rgba(248,113,113,.15);color:var(--danger)}
.ix-item.placed{opacity:.4;pointer-events:none}
.ix-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;min-height:60px;text-align:center;transition:all .2s}
.ix-zone.highlight{border-color:var(--neon);background:var(--neon-dim)}
.ix-zone .zone-label{font-size:14px;color:var(--text-dim);font-weight:600;margin-bottom:8px}
.ix-btn{background:var(--neon);color:var(--bg);border:none;padding:12px 28px;border-radius:var(--radius);font-size:17px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:16px;transition:transform .2s}
.ix-btn:hover{transform:scale(1.05)}
.ix-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ix-feedback{text-align:center;padding:14px;border-radius:var(--radius);font-size:18px;font-weight:700;margin-top:12px;display:none}
.ix-feedback.pass{display:block;background:rgba(74,222,128,.12);color:var(--success)}
.ix-feedback.fail{display:block;background:rgba(248,113,113,.12);color:var(--danger)}

/* ═══ Quiz ═══ */
.quiz-section,.boss-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:20px 0}
.boss-section{border-color:var(--warning);box-shadow:0 0 20px rgba(251,191,36,.1)}
.quiz-section h3,.boss-section h3{color:var(--heading);margin-bottom:16px;font-size:20px}
.boss-sub{color:var(--warning);font-size:14px;margin-bottom:16px}
.quiz-q{margin-bottom:20px}
.quiz-q p{font-weight:600;font-size:17px;margin-bottom:10px;color:var(--heading)}
.quiz-q label{display:block;padding:10px 16px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .2s;font-size:16px}
.quiz-q label:hover{background:var(--neon-dim)}
.quiz-q label.correct{background:rgba(74,222,128,.15);border-color:var(--success);color:var(--success)}
.quiz-q label.wrong{background:rgba(248,113,113,.15);border-color:var(--danger);color:var(--danger)}
.quiz-submit{background:var(--neon);color:var(--bg);border:none;padding:12px 28px;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font)}
.quiz-submit:disabled{opacity:.5;cursor:not-allowed}
.quiz-result{padding:14px;border-radius:var(--radius);font-weight:700;font-size:17px;margin-top:12px;text-align:center}
.quiz-result.pass{background:rgba(74,222,128,.12);color:var(--success)}
.quiz-result.fail{background:rgba(248,113,113,.12);color:var(--danger)}
.quiz-explanation{margin-top:6px;padding:8px 14px;border-radius:var(--radius);background:rgba(74,222,128,.08);border-left:3px solid var(--success);font-size:14px;color:var(--success);font-weight:600}

/* ═══ Badges View ═══ */
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:16px}
.badge-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.badge-card.earned{border-color:var(--neon);box-shadow:var(--neon-glow)}
.badge-card .badge-icon{font-size:36px;margin-bottom:6px}
.badge-card .badge-name{font-weight:700;font-size:14px;color:var(--heading)}
.badge-card .badge-desc{font-size:12px;color:var(--text-dim);margin-top:4px}
.badge-card.locked{opacity:.4}

/* ═══ Stats View ═══ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-top:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.stat-card .stat-val{font-size:36px;font-weight:700;color:var(--neon)}
.stat-card .stat-label{font-size:14px;color:var(--text-dim);margin-top:4px}

/* ═══ Notifications ═══ */
.notif{position:fixed;top:-80px;right:20px;padding:14px 20px;border-radius:var(--radius);font-size:15px;z-index:999;transition:top .4s ease;box-shadow:var(--shadow);max-width:340px}
.notif.show{top:70px}
.notif.xp{background:var(--xp-purple);color:#fff}
.notif.badge{background:var(--badge-cyan);color:#000}
.notif.streak{background:var(--streak-red);color:#fff}
.notif.level{background:var(--neon);color:var(--bg)}
.notif-title{font-weight:700;font-size:16px}
.notif-text{font-size:13px;opacity:.85;margin-top:2px}

/* ═══ Level Up Overlay ═══ */
.level-up-overlay{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7)}
.level-up-overlay.active{display:flex}
.lvl-box{text-align:center;animation:popIn .5s ease}
.lvl-icon{font-size:64px}
.lvl-title{font-size:36px;font-weight:900;color:var(--neon);margin:8px 0}
.lvl-name{font-size:20px;color:var(--heading)}
@keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:501;overflow:hidden}

/* ═══ Certificate Overlay ═══ */
.cert-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);align-items:center;justify-content:center;flex-direction:column;padding:20px;overflow-y:auto}
.cert-overlay.active{display:flex}
.cert-picker{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.cert-picker button{padding:8px 16px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font);transition:all .2s}
.cert-picker button.active{border-color:var(--neon);color:var(--neon);background:var(--neon-dim)}
.cert-frame{width:min(700px,95vw);min-height:500px;border-radius:12px;overflow:hidden}
.cert-actions{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.cert-actions button{padding:10px 20px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font);transition:all .2s}
.cert-actions button:hover{border-color:var(--neon);color:var(--neon)}

/* ═══ Print Styles ═══ */
@media print{
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
.header,.sidebar,.notif,.level-up-overlay,#confetti{display:none!important}
.main{margin-left:0!important;padding:20px!important}
.lesson-card{break-inside:avoid;page-break-inside:avoid;margin-bottom:24px}
}

/* ═══ Footer ═══ */
.site-footer{text-align:center;padding:32px 0;margin-top:40px;border-top:1px solid var(--border);color:var(--text-dim);font-size:13px}
.footer-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;font-weight:700;color:var(--text)}
.footer-logo svg{width:24px;height:24px}

.zoom-controls{position:fixed;bottom:16px;left:16px;display:flex;gap:4px;z-index:9999}
.zoom-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border,#2a3444);background:var(--bg2,#111827);color:var(--text,#d4dce8);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;line-height:1}
.zoom-btn:hover{border-color:var(--neon,#3b82f6);color:var(--neon,#3b82f6);transform:scale(1.1)}
.zoom-btn:focus-visible{outline:2px solid var(--neon,#3b82f6);outline-offset:2px}
.zoom-level{font-size:10px;position:absolute;top:-16px;left:50%;transform:translateX(-50%);color:var(--text-dim,#8899aa);white-space:nowrap;pointer-events:none}

/* A11y: Print improvements */
@media print{body{background:#fff!important;color:#000!important}.cert-overlay,.modal-overlay,.level-up-overlay,.theme-overlay,.zoom-controls{display:none!important}.lesson-card,.quiz-section,.boss-section,.interactive-area{break-inside:avoid;page-break-inside:avoid}}

/* Audio/Speech */
.tts-btn{background:none;border:none;cursor:pointer;font-size:.9em;opacity:.5;transition:all .2s;vertical-align:middle;margin-left:8px;padding:2px 6px;border-radius:4px}
.tts-btn:hover{opacity:1;background:var(--bg2)}.tts-btn.speaking{opacity:1;color:var(--neon);animation:tts-pulse 1s infinite}
@keyframes tts-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.tts-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin:8px 0;font-size:.8rem;flex-wrap:wrap}
.tts-bar select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.78rem}
.tts-bar button{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;color:var(--text);font-size:.8rem}
.tts-bar button:hover{background:var(--bg)}
.speech-ex{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 0;text-align:center}
.speech-ex h4{margin:0 0 8px;font-size:1rem}
.mic-btn{font-size:1.6em;background:none;border:2px solid var(--neon);border-radius:50%;width:52px;height:52px;cursor:pointer;transition:all .3s;color:var(--text);display:inline-flex;align-items:center;justify-content:center}
.mic-btn:hover{background:var(--neon);color:var(--bg)}.mic-btn.rec{background:#ef4444;border-color:#ef4444;color:#fff;animation:tts-pulse 1s infinite}
.sr-res{margin-top:8px;padding:6px 10px;border-radius:4px;font-weight:600;font-size:.85rem;display:inline-block}
.sr-res.good{background:#22c55e22;color:#22c55e}.sr-res.retry{background:#f59e0b22;color:#f59e0b}
.sr-na{font-size:.8rem;color:var(--text-dim);margin-top:8px}
</style>

<script>

// === Audio (TTS) ===
const _synth=window.speechSynthesis,_LANG='de-DE';let _ttsOn=false,_ttsRate=1,_ttsTimer=null;
function speakLesson(i){if(_ttsOn){stopTTS();return}const c=document.querySelectorAll('.lesson-card');if(!c[i]||!_synth)return;stopTTS();const u=new SpeechSynthesisUtterance(c[i].innerText);u.lang=_LANG;u.rate=_ttsRate;u.onstart=()=>{_ttsOn=true;updTTSUI();startTTSTimer()};u.onend=()=>{_ttsOn=false;updTTSUI();clearTTSTimer()};u.onerror=()=>{_ttsOn=false;updTTSUI();clearTTSTimer()};_synth.speak(u);showTTSBar()}
function speakText(t,lang){if(!_synth)return;stopTTS();const u=new SpeechSynthesisUtterance(t);u.lang=lang||_LANG;u.rate=_ttsRate;u.onstart=()=>{_ttsOn=true;updTTSUI();startTTSTimer()};u.onend=()=>{_ttsOn=false;updTTSUI();clearTTSTimer()};u.onerror=()=>{_ttsOn=false;updTTSUI();clearTTSTimer()};_synth.speak(u)}
function stopTTS(){if(_synth){_synth.cancel()}_ttsOn=false;updTTSUI();clearTTSTimer()}
function updTTSUI(){document.querySelectorAll('.tts-btn').forEach(b=>b.classList.toggle('speaking',_ttsOn))}
function setTTSRate(r){_ttsRate=parseFloat(r)}
function startTTSTimer(){clearTTSTimer();_ttsTimer=setInterval(()=>{if(_synth&&_synth.speaking&&!_synth.paused){_synth.pause();_synth.resume()}},10000)}
function clearTTSTimer(){if(_ttsTimer){clearInterval(_ttsTimer);_ttsTimer=null}}
function showTTSBar(){if(document.getElementById('ttsBar'))return;const mc=document.getElementById('moduleContent');if(!mc)return;const b=document.createElement('div');b.className='tts-bar';b.id='ttsBar';b.innerHTML='\u{1F50A} <select onchange="setTTSRate(this.value)"><option value="0.7">Langsam</option><option value="1" selected>Normal</option><option value="1.3">Schnell</option></select> <button onclick="stopTTS()">\u25A0 Stopp</button>';mc.prepend(b)}

// === Audio (STT) ===
const _SR=window.SpeechRecognition||window.webkitSpeechRecognition;let _rec=null,_recCB=null;
function initSR(){if(!_SR)return false;_rec=new _SR();_rec.lang=_LANG;_rec.continuous=false;_rec.interimResults=false;_rec.onresult=e=>{const t=e.results[0][0].transcript.toLowerCase().trim();if(_recCB)_recCB(t,e.results[0][0].confidence)};_rec.onerror=()=>{document.querySelectorAll('.mic-btn').forEach(b=>b.classList.remove('rec'))};_rec.onend=()=>{document.querySelectorAll('.mic-btn').forEach(b=>b.classList.remove('rec'))};return true}
function startSR(cb){if(!_rec&&!initSR()){cb(null,0);return}_recCB=cb;document.querySelectorAll('.mic-btn').forEach(b=>b.classList.add('rec'));try{_rec.start()}catch(e){cb(null,0)}}
let _spIdx=0,_spSen=[];
function initSpEx(m){const mod=modules[m];const d=document.createElement('div');d.innerHTML=mod.lessons.map(l=>l.content).join(' ');_spSen=d.textContent.split(/[.!?]+/).map(s=>s.trim()).filter(s=>s.length>15&&s.length<100).slice(0,5);_spIdx=0;renderSpEx()}
function renderSpEx(){const el=document.getElementById('speechExArea');if(!el)return;if(!_spSen.length){el.innerHTML='<p class="sr-na">Keine S\u00E4tze f\u00FCr Sprach\u00FCbung verf\u00FCgbar.</p>';return}const s=_spSen[_spIdx].replace(/"/g,'&quot;').replace(/'/g,'&#39;');el.innerHTML='<p style="font-size:1.05em;color:var(--neon);margin:10px 0;font-style:italic">&bdquo;'+_spSen[_spIdx]+'&ldquo;</p><div style="display:flex;justify-content:center;gap:16px;margin:12px 0"><button class="tts-btn" onclick="speakText(this.closest(\'.speech-ex\').querySelector(\'p\').textContent)" style="font-size:1.5em;opacity:1" title="Vorlesen">&#128266;</button>'+(_SR?'<button class="mic-btn" onclick="doSpCheck()" title="Nachsprechen">&#127908;</button>':'<p class="sr-na">Spracherkennung nicht verf\u00FCgbar.</p>')+'</div><div id="srRes"></div><div style="font-size:.78rem;color:var(--text-dim);margin-top:8px">Satz '+(_spIdx+1)+' von '+_spSen.length+'</div>'}
function doSpCheck(){const expected=_spSen[_spIdx].toLowerCase().replace(/[^a-z\u00e4\u00f6\u00fc\u00df\u00e9\u00e8\u00ea\u00e0 0-9]/g,'');startSR((spoken,conf)=>{const el=document.getElementById('srRes');if(!el)return;if(!spoken){el.innerHTML='<span class="sr-res retry">Nicht erkannt \u2014 nochmal versuchen</span>';return}const sim=calcSim(spoken.replace(/[^a-z\u00e4\u00f6\u00fc\u00df\u00e9\u00e8\u00ea\u00e0 0-9]/g,''),expected);if(sim>.45){el.innerHTML='<span class="sr-res good">\u2714 Gut! ('+Math.round(sim*100)+'%)</span>';_spIdx++;setTimeout(()=>{if(_spIdx<_spSen.length)renderSpEx();else{el.innerHTML='<span class="sr-res good">\u2714 Alle S\u00E4tze geschafft!</span>';if(typeof addXP==='function'&&typeof state!=='undefined'&&!state.interactiveResults['sp_'+state.currentModule]){state.interactiveResults['sp_'+state.currentModule]=true;addXP(30,'Sprach\u00FCbung');saveState()}}},1200)}else{el.innerHTML='<span class="sr-res retry">\u21BB Nochmal: &quot;'+spoken+'&quot;</span>'}})}
function calcSim(a,b){const wa=a.split(/\s+/).filter(Boolean),wb=b.split(/\s+/).filter(Boolean);if(!wa.length||!wb.length)return 0;let c=0;wa.forEach(w=>{if(wb.some(x=>x.includes(w)||w.includes(x)))c++});return c/Math.max(wa.length,wb.length)}


/* === Fortschritt-Export (TXT) === */
function exportFortschritt(){
  var t=document.title.replace(/\s*[\u2014\u2013|].*/,'').trim();
  var d=new Date();
  var dd=String(d.getDate()).padStart(2,'0');
  var mm=String(d.getMonth()+1).padStart(2,'0');
  var yyyy=d.getFullYear();
  var datum=dd+'.'+mm+'.'+yyyy;
  var datumFile=yyyy+'-'+mm+'-'+dd;

  var mc=state.modulesCompleted||[];
  var total=modules.length;
  var done=mc.length;

  var lvl=0;
  for(var i=LEVELS.length-1;i>=0;i--){if(state.xp>=LEVELS[i].xp){lvl=i;break;}}
  var lvlName=LEVELS[lvl]?LEVELS[lvl].name:'';

  var sep='\u2550'.repeat(42);
  var sep2='\u2500'.repeat(42);
  var lines=[];
  lines.push(sep);
  lines.push('  LERNFORTSCHRITT \u2014 '+t);
  lines.push(sep);
  lines.push('');
  lines.push('  Sch\u00FCler:   '+(state.name||'(kein Name)'));
  lines.push('  Datum:     '+datum);
  lines.push('  Level:     '+(lvl+1)+' \u2014 '+lvlName+' ('+state.xp+' XP)');
  lines.push('  Streak:    '+(state.streak||0)+' Tage in Folge');
  lines.push('');
  lines.push(sep2);
  lines.push('  MODULE ('+done+'/'+total+' abgeschlossen)');
  lines.push(sep2);
  lines.push('');

  for(var m=0;m<modules.length;m++){
    var mod=modules[m];
    var isDone=mc.indexOf(m)!==-1;
    var icon=isDone?'\u2705':'\u2B1C';
    var line='  '+icon+' Modul '+(m+1)+': '+mod.title;
    if(isDone){
      var qs=state.quizResults&&state.quizResults[m]!=null?state.quizResults[m]:'?';
      var bs=state.bossResults&&state.bossResults[m]!=null?state.bossResults[m]:'?';
      line+='\n        Quiz: '+qs+'/5 | Boss: '+bs+'/3';
    }
    lines.push(line);
  }

  var earnedBadges=(state.badges||[]);
  lines.push('');
  lines.push(sep2);
  lines.push('  ABZEICHEN ('+earnedBadges.length+'/'+BADGES.length+')');
  lines.push(sep2);
  lines.push('');
  if(earnedBadges.length===0){
    lines.push('  (noch keine)');
  }else{
    for(var b=0;b<BADGES.length;b++){
      if(earnedBadges.indexOf(BADGES[b].id)!==-1){
        lines.push('  '+BADGES[b].icon+' '+BADGES[b].name);
      }
    }
  }

  lines.push('');
  lines.push(sep);
  lines.push('  (c) 2026 GZ AI Stacks \u2014 Gerd Zimmermann');
  lines.push(sep);

  var txt=lines.join('\n');
  var safeName=(state.name||'Schueler').replace(/[^a-zA-Z0-9\u00C0-\u017F]/g,'_');
  var fileName='Fortschritt_'+t.replace(/[^a-zA-Z0-9\u00C0-\u017F]/g,'_')+'_'+safeName+'_'+datumFile+'.txt';
  var a=document.createElement('a');
  a.download=fileName;
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.click();
}

const _qk=[0x4A,0x7F,0x2B,0x61,0x5C,0x3E,0x18,0x73];
function _d(h,i){return h^_qk[i%_qk.length]}

<p>Konsonanten klingen nur zusammen mit einem Vokal richtig: <strong>Ma</strong>, <strong>Le</strong>, <strong>Si</strong>.</p>
<p>Probier mal, nur ein „M" zu sagen — das geht: „Mmmmm". Aber ein „B" alleine? Das ist schwieriger!</p>`},
{title:'Groß und klein',content:`<p>Jeden Buchstaben gibt es zweimal — als <strong>großen</strong> und als <strong>kleinen</strong> Buchstaben:</p>
<ul><li>🔤 <strong>M</strong> und <strong>m</strong></li>
<li>🔤 <strong>B</strong> und <strong>b</strong></li>
<li>🔤 <strong>S</strong> und <strong>s</strong></li></ul>
<div class="info-box">💡 <strong>Merke:</strong> Am Satzanfang und bei Namen schreiben wir immer einen <strong>großen</strong> Buchstaben!</div>
<p>Beispiele: <strong>M</strong>ama, <strong>S</strong>onne, <strong>H</strong>und, <strong>T</strong>isch</p>`}

let state={name:'',started:false,currentModule:0,xp:0,level:0,streak:0,lastVisit:null,modulesCompleted:[],quizResults:{},bossResults:{},badges:[],quizShuffleMap:{},modulesViewed:[],interactiveResults:{},designTheme:'wald-dark'};
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);if(s){Object.assign(state,JSON.parse(s));return true}}catch(e){}return false}
function exportData(){const a=document.createElement('a');a.download='buchstabenreise-'+state.name+'.json';a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.click()}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);Object.assign(state,d);saveState();location.reload()}catch(err){alert('Datei konnte nicht gelesen werden.')}};r.readAsText(f)}

// ═══════════════════════════════════════════════
// XP & Level Engine
// ═══════════════════════════════════════════════
function getLevel(xp){let lv=0;for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){lv=i;break}}return lv}
function getLevelProgress(xp){const lv=getLevel(xp);const cur=LEVELS[lv].xp;const next=lv<LEVELS.length-1?LEVELS[lv+1].xp:cur;if(next===cur)return 100;return Math.min(100,Math.round((xp-cur)/(next-cur)*100))}
function addXP(amount,reason){const old=getLevel(state.xp);state.xp+=amount;const nw=getLevel(state.xp);saveState();updateUI();showNotif('xp','+'+amount+' XP',reason);if(nw>old){state.level=nw;saveState();setTimeout(()=>showLevelUp(nw),800)}}

// Streak

function updateStreak(){const today=new Date().toDateString();if(state.lastVisit===today)return;const yesterday=new Date(Date.now()-86400000).toDateString();if(state.lastVisit===yesterday){state.streak++;showNotif('streak','🔥 '+state.streak+' Tage Streak!','Weiter so!');if(state.streak>=3)awardBadge('streak3');if(state.streak>=7)awardBadge('streak7')}else if(state.lastVisit!==today){state.streak=1}state.lastVisit=today;saveState()}

// ═══════════════════════════════════════════════
// Quiz Engine
// ═══════════════════════════════════════════════
function shuffleQuiz(modId,quiz){const key='m'+modId;if(state.quizShuffleMap[key])return state.quizShuffleMap[key];const idx=[...Array(quiz.length).keys()];for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]]}state.quizShuffleMap[key]=idx;saveState();return idx}
function renderQuiz(modId,quiz,isBoss){
  const pf=isBoss?'boss':'quiz';const idx=isBoss?[...Array(quiz.length).keys()]:shuffleQuiz(modId,quiz);
  let h='<div class="'+(isBoss?'boss-section':'quiz-section')+'">';
  h+=isBoss?'<h3>👑 Boss-Challenge</h3><p class="boss-sub">Alle '+quiz.length+' Fragen richtig beantworten!</p>':'<h3>📝 Quiz — Teste dein Wissen</h3>';
  idx.forEach((qi,di)=>{const q=quiz[qi];h+='<div class="quiz-q" data-qi="'+qi+'"><p>'+(di+1)+'. '+q.q+'</p>';q.a.forEach((a,ai)=>{h+='<label><input type="radio" name="'+pf+'_'+modId+'_'+qi+'" value="'+ai+'"> '+a+'</label>'});h+='</div>'});
  h+='<button class="quiz-submit" onclick="checkQuiz('+modId+','+isBoss+')">'+(isBoss?'Boss besiegen!':'Antworten prüfen')+'</button>';
  h+='<div class="quiz-result" id="'+pf+'Result'+modId+'" style="display:none"></div></div>';return h;
}
function checkQuiz(modId,isBoss){
  const pf=isBoss?'boss':'quiz';const quiz=isBoss?modules[modId].boss:modules[modId].quiz;
  let correct=0;const total=quiz.length;const startTime=window._quizStart||Date.now();
  quiz.forEach((q,qi)=>{
    const sel=document.querySelector('input[name="'+pf+'_'+modId+'_'+qi+'"]:checked');
    const labels=document.querySelectorAll('[data-qi="'+qi+'"] label');
    const ci=_d(q._h,qi);
    labels.forEach((l,li)=>{l.classList.remove('correct','wrong');if(li===ci)l.classList.add('correct');else if(sel&&parseInt(sel.value)===li)l.classList.add('wrong')});
    const qDiv=labels[0]?.closest('.quiz-q');if(qDiv){const old=qDiv.querySelector('.quiz-explanation');if(old)old.remove()}
    if(!sel||parseInt(sel.value)!==ci){if(qDiv){const exp=document.createElement('div');exp.className='quiz-explanation';exp.textContent='\u2192 Richtige Antwort: '+q.a[ci];qDiv.appendChild(exp)}}
    if(sel&&parseInt(sel.value)===ci)correct++;
  });
  const rEl=document.getElementById(pf+'Result'+modId);rEl.style.display='block';
  if(isBoss){
    if(correct===total){
      rEl.className='quiz-result pass';rEl.textContent='👑 Boss besiegt! '+correct+'/'+total+' — Perfekt!';
      if(!state.bossResults[modId]){state.bossResults[modId]=true;addXP(100,'Boss-Challenge bestanden!');if(!state.badges.includes('first_boss'))awardBadge('first_boss');if(modules.every((_,i)=>state.bossResults[i]))awardBadge('all_bosses');checkModuleComplete(modId)}
    }else{rEl.className='quiz-result fail';rEl.textContent='💀 '+correct+'/'+total+' — Alle müssen richtig sein! Versuch es nochmal.';setTimeout(()=>{document.querySelectorAll('input[name^="'+pf+'_'+modId+'"]').forEach(r=>{r.disabled=false;r.checked=false});document.querySelectorAll('[data-qi] label').forEach(l=>l.classList.remove('correct','wrong'));document.querySelectorAll('.quiz-explanation').forEach(e=>e.remove());rEl.style.display='none'},2000);return}
  }else{
    const passed=correct>=Math.ceil(total*0.6);rEl.className='quiz-result '+(passed?'pass':'fail');
    rEl.textContent=passed?'✅ '+correct+'/'+total+' richtig — Bestanden!':'❌ '+correct+'/'+total+' richtig — Mindestens '+Math.ceil(total*0.6)+' nötig.';
    if(passed&&!state.quizResults[modId]){state.quizResults[modId]=correct;addXP(correct*15+50,'Quiz bestanden ('+correct+'/'+total+')');if(!state.badges.includes('first_quiz'))awardBadge('first_quiz');if(correct===total)awardBadge('perfect_quiz');if(Date.now()-startTime<60000)awardBadge('speed_quiz');checkModuleComplete(modId)}
  }
  saveState();document.querySelectorAll('input[name^="'+pf+'_'+modId+'"]').forEach(r=>r.disabled=true);
  window.scrollTo({top:0,behavior:'smooth'});
}
function checkModuleComplete(modId){
  if(state.quizResults[modId]!==undefined&&state.bossResults[modId]&&!state.modulesCompleted.includes(modId)){
    state.modulesCompleted.push(modId);awardBadge('m'+modId);
    if(state.modulesCompleted.length>=5)awardBadge('half_done');
    if(state.modulesCompleted.length>=10){awardBadge('graduate');setTimeout(()=>showCert(),1500)}
    saveState();renderSidebar();
  }
}

<script>
(function(){
var KEY=null;
var scripts=document.querySelectorAll('script');
for(var i=0;i<scripts.length;i++){
var km=scripts[i].textContent.match(/STORAGE_KEY\s*=\s*['"](\w+)['"]/);
if(km){KEY=km[1];break;}
}
if(!location.hash.match(/modules=/)){try{Object.keys(localStorage).filter(function(k){return k.indexOf("_allowed_modules")!==-1}).forEach(function(k){localStorage.removeItem(k)})}catch(e){}}
var LOCK_KEY=(KEY||'app')+'_allowed_modules';
var h=location.hash.match(/modules=([0-9,]+)/);
var allowed=null;
if(h){
allowed=h[1].split(",").map(Number);
try{localStorage.setItem(LOCK_KEY,JSON.stringify(allowed));}catch(e){}
}else{
try{var stored=localStorage.getItem(LOCK_KEY);if(stored)allowed=JSON.parse(stored);}catch(e){}
}
if(!allowed||!allowed.length)return;
function filterSidebar(){
var items=document.querySelectorAll("#sidebarModules > *");
for(var i=0;i<items.length;i++){
items[i].style.display=(allowed.indexOf(i)===-1)?"none":"";
}
}
var sb=document.getElementById("sidebarModules");
if(sb){new MutationObserver(filterSidebar).observe(sb,{childList:true});filterSidebar();}
document.addEventListener("click",function(e){
var t=e.target.closest("[onclick]");
if(!t)return;
var oc=t.getAttribute("onclick")||"";
var idx=oc.indexOf("renderModule(");
if(idx===-1)return;
var num=parseInt(oc.substring(idx+13));
if(!isNaN(num)&&allowed.indexOf(num)===-1){e.preventDefault();e.stopImmediatePropagation();}
},true);
setTimeout(filterSidebar,500);
window.addEventListener("hashchange",function(){
var hh=location.hash.match(/modules=([0-9,]+)/);
if(hh){
allowed=hh[1].split(",").map(Number);
try{localStorage.setItem(LOCK_KEY,JSON.stringify(allowed));}catch(e){}
filterSidebar();
}
});
})();
</script>

document.addEventListener('keydown',function(e){
if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
if((e.key==='+'||e.key==='=')&&!e.ctrlKey&&!e.metaKey){e.preventDefault();zoomIn();}
else if((e.key==='-'||e.key==='_')&&!e.ctrlKey&&!e.metaKey){e.preventDefault();zoomOut();}
else if(e.key==='0'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();zoomReset();}
});
})();
</script>

<script>
/* A11y: Focus trap for modal overlays */
document.addEventListener('keydown',function(e){if(e.key==='Tab'){var ov=document.querySelector('.cert-overlay.active,.modal-overlay.active,[role="dialog"].active');if(ov){var fc=ov.querySelectorAll('button,a,[tabindex="0"],input,select,textarea');if(fc.length){var f=fc[0],l=fc[fc.length-1];if(e.shiftKey&&document.activeElement===f){e.preventDefault();l.focus()}else if(!e.shiftKey&&document.activeElement===l){e.preventDefault();f.focus()}}}}});
</script>
