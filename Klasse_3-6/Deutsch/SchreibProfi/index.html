html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:17px;line-height:1.7;min-height:100vh;transition:background .3s,color .3s}
a{color:var(--link);text-decoration:none}a:hover{text-decoration:underline}
.skip-nav{position:absolute;top:-50px;left:8px;background:var(--neon);color:var(--bg);padding:8px 16px;z-index:9999;border-radius:0 0 8px 8px;font-weight:700}.skip-nav:focus{top:0}
.header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(12px)}
.header .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;color:var(--heading)}.header .logo svg{width:32px;height:32px}
.header .xp-bar{flex:1;max-width:260px;margin-left:auto}.header .xp-label{font-size:12px;color:var(--text-dim);display:flex;justify-content:space-between;font-weight:600}.header .xp-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:2px}.header .xp-fill{height:100%;background:var(--neon);border-radius:4px;transition:width .5s}
.hamburger{display:none;background:none;border:2px solid var(--border);color:var(--text);font-size:22px;padding:4px 10px;border-radius:var(--radius);cursor:pointer}@media(max-width:800px){.hamburger{display:block}}
.sidebar{position:fixed;top:54px;left:0;width:280px;height:calc(100vh - 54px);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:16px;z-index:90;transition:transform .3s}
.sidebar h3{font-size:14px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text);font-size:15px;transition:background .2s;margin-bottom:4px;border:1px solid transparent}.sidebar-item:hover{background:var(--neon-dim);border-color:var(--border)}.sidebar-item.active{background:var(--neon-dim);border-color:var(--neon);color:var(--neon);font-weight:700}.sidebar-item.completed::after{content:'✓';margin-left:auto;color:var(--success);font-weight:700}
.sidebar-link{display:block;padding:10px 12px;border-radius:var(--radius);color:var(--text-dim);font-size:14px;cursor:pointer;transition:background .2s;margin-bottom:2px}.sidebar-link:hover{background:var(--neon-dim);color:var(--text)}
@media(max-width:800px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
.main{margin-left:280px;padding:32px;max-width:860px}@media(max-width:800px){.main{margin-left:0;padding:16px}}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px 20px}
.welcome .hero-emoji{font-size:80px;margin-bottom:16px;animation:bounce 2s ease-in-out infinite}@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.welcome h1{font-size:clamp(32px,6vw,52px);color:var(--heading);margin-bottom:8px}.welcome .sub{font-size:clamp(16px,3vw,20px);color:var(--text-dim);margin-bottom:32px;max-width:500px}
.welcome input{font-size:20px;padding:14px 24px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg2);color:var(--text);text-align:center;width:min(340px,90%);outline:none;font-family:var(--font);transition:border-color .3s}.welcome input:focus{border-color:var(--neon)}
.welcome .start-btn{margin-top:20px;padding:16px 48px;font-size:20px;font-weight:700;border-radius:var(--radius);border:none;background:var(--neon);color:var(--bg);cursor:pointer;font-family:var(--font);transition:transform .2s,box-shadow .2s}.welcome .start-btn:hover{transform:scale(1.05);box-shadow:var(--neon-glow)}.welcome .start-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.theme-picker{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;justify-content:center}.theme-btn{width:44px;height:44px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .2s,border-color .2s}.theme-btn:hover{transform:scale(1.15)}.theme-btn.active{border-color:var(--heading);transform:scale(1.15)}.mode-toggle{background:var(--bg3);border:2px solid var(--border);color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:18px;transition:all .2s;margin-left:8px}.mode-toggle:hover{border-color:var(--neon)}
.module-header{text-align:center;margin-bottom:32px}.module-header .mod-badge{display:inline-block;background:var(--neon-dim);border:1px solid var(--border);color:var(--neon);padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;margin-bottom:12px}.module-header h1{color:var(--heading);font-size:clamp(24px,4vw,36px)}.module-header .mod-desc{color:var(--text-dim);margin-top:8px;font-size:16px}
.lesson-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;margin-bottom:20px;box-shadow:var(--shadow)}.lesson-card h3{color:var(--heading);font-size:20px;margin-bottom:12px}.lesson-card p,.lesson-card li{font-size:17px;line-height:1.8;margin-bottom:8px}.lesson-card .info-box{background:var(--neon-dim);border-left:4px solid var(--neon);padding:14px 18px;border-radius:0 var(--radius) var(--radius) 0;margin:16px 0;font-size:16px}.lesson-card ul,.lesson-card ol{padding-left:24px;margin:12px 0}
.interactive-area{background:var(--card);border:2px solid var(--neon);border-radius:var(--radius);padding:24px;margin:24px 0;box-shadow:var(--neon-glow)}.interactive-area h4{color:var(--neon);font-size:18px;margin-bottom:16px}#interactiveContent{min-height:100px}
.ix-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:16px 0}.ix-item{background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);padding:14px 20px;font-size:20px;cursor:pointer;transition:all .2s;user-select:none;text-align:center;min-width:60px}.ix-item:hover{border-color:var(--neon);background:var(--neon-dim)}.ix-item.selected{border-color:var(--neon);background:var(--neon-dim);box-shadow:var(--neon-glow)}.ix-item.correct{border-color:var(--success);background:rgba(74,222,128,.15);color:var(--success)}.ix-item.wrong{border-color:var(--danger);background:rgba(248,113,113,.15);color:var(--danger)}.ix-item.placed{opacity:.4;pointer-events:none}
.ix-btn{background:var(--neon);color:var(--bg);border:none;padding:12px 28px;border-radius:var(--radius);font-size:17px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:16px;transition:transform .2s}.ix-btn:hover{transform:scale(1.05)}.ix-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ix-feedback{text-align:center;padding:14px;border-radius:var(--radius);font-size:18px;font-weight:700;margin-top:12px;display:none}.ix-feedback.pass{display:block;background:rgba(74,222,128,.12);color:var(--success)}.ix-feedback.fail{display:block;background:rgba(248,113,113,.12);color:var(--danger)}
.ix-blank{display:inline-block;min-width:80px;border-bottom:2px dashed var(--neon);padding:2px 8px;margin:0 4px;cursor:pointer;transition:all .2s;text-align:center;font-weight:700;color:var(--neon)}.ix-blank.filled{border-bottom-style:solid;background:var(--neon-dim);border-radius:6px}.ix-blank.correct-b{border-color:var(--success);color:var(--success)}.ix-blank.wrong-b{border-color:var(--danger);color:var(--danger)}
.ix-wordbank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0}.ix-wb-btn{background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);padding:8px 16px;font-size:16px;cursor:pointer;transition:all .2s;font-family:var(--font)}.ix-wb-btn:hover{border-color:var(--neon);background:var(--neon-dim)}.ix-wb-btn.used{opacity:.3;pointer-events:none}
.ix-mark{display:inline;padding:2px 4px;border-radius:4px;cursor:pointer;transition:all .2s}.ix-mark:hover{background:var(--neon-dim)}.ix-mark.mark-nomen{background:rgba(74,222,128,.2);border-bottom:2px solid var(--success)}.ix-mark.mark-verb{background:rgba(56,189,248,.2);border-bottom:2px solid #38bdf8}.ix-mark.mark-adj{background:rgba(251,191,36,.2);border-bottom:2px solid var(--warning)}
.ix-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;min-height:60px;text-align:center;transition:all .2s;flex:1;min-width:120px}.ix-zone .zone-label{font-size:14px;color:var(--text-dim);font-weight:600;margin-bottom:8px}
.quiz-section,.boss-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:20px 0}.boss-section{border-color:var(--warning);box-shadow:0 0 20px rgba(251,191,36,.1)}.quiz-section h3,.boss-section h3{color:var(--heading);margin-bottom:16px;font-size:20px}.boss-sub{color:var(--warning);font-size:14px;margin-bottom:16px}
.quiz-q{margin-bottom:20px}.quiz-q p{font-weight:600;font-size:17px;margin-bottom:10px;color:var(--heading)}.quiz-q label{display:block;padding:10px 16px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .2s;font-size:16px}.quiz-q label:hover{background:var(--neon-dim)}.quiz-q label.correct{background:rgba(74,222,128,.15);border-color:var(--success);color:var(--success)}.quiz-q label.wrong{background:rgba(248,113,113,.15);border-color:var(--danger);color:var(--danger)}
.quiz-submit{background:var(--neon);color:var(--bg);border:none;padding:12px 28px;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font)}.quiz-submit:disabled{opacity:.5;cursor:not-allowed}
.quiz-result{padding:14px;border-radius:var(--radius);font-weight:700;font-size:17px;margin-top:12px;text-align:center}.quiz-result.pass{background:rgba(74,222,128,.12);color:var(--success)}.quiz-result.fail{background:rgba(248,113,113,.12);color:var(--danger)}
.quiz-explanation{margin-top:6px;padding:8px 14px;border-radius:var(--radius);background:rgba(74,222,128,.08);border-left:3px solid var(--success);font-size:14px;color:var(--success);font-weight:600}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:16px}.badge-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}.badge-card.earned{border-color:var(--neon);box-shadow:var(--neon-glow)}.badge-card .badge-icon{font-size:36px;margin-bottom:6px}.badge-card .badge-name{font-weight:700;font-size:14px;color:var(--heading)}.badge-card .badge-desc{font-size:12px;color:var(--text-dim);margin-top:4px}.badge-card.locked{opacity:.4}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-top:16px}.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}.stat-card .stat-val{font-size:36px;font-weight:700;color:var(--neon)}.stat-card .stat-label{font-size:14px;color:var(--text-dim);margin-top:4px}
.notif{position:fixed;top:-80px;right:20px;padding:14px 20px;border-radius:var(--radius);font-size:15px;z-index:999;transition:top .4s ease;box-shadow:var(--shadow);max-width:340px}.notif.show{top:70px}.notif.xp{background:var(--xp-purple);color:#fff}.notif.badge{background:var(--badge-cyan);color:#000}.notif.streak{background:var(--streak-red);color:#fff}.notif.level{background:var(--neon);color:var(--bg)}.notif-title{font-weight:700;font-size:16px}.notif-text{font-size:13px;opacity:.85;margin-top:2px}
.level-up-overlay{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7)}.level-up-overlay.active{display:flex}.lvl-box{text-align:center;animation:popIn .5s ease}.lvl-icon{font-size:64px}.lvl-title{font-size:36px;font-weight:900;color:var(--neon);margin:8px 0}.lvl-name{font-size:20px;color:var(--heading)}@keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}#confetti{position:fixed;inset:0;pointer-events:none;z-index:501;overflow:hidden}
.cert-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);align-items:center;justify-content:center;flex-direction:column;padding:20px;overflow-y:auto}.cert-overlay.active{display:flex}.cert-picker{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}.cert-picker button{padding:8px 16px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font);transition:all .2s}.cert-picker button.active{border-color:var(--neon);color:var(--neon);background:var(--neon-dim)}.cert-frame{width:min(700px,95vw);min-height:500px;border-radius:12px;overflow:hidden}.cert-actions{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;justify-content:center}.cert-actions button{padding:10px 20px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font);transition:all .2s}.cert-actions button:hover{border-color:var(--neon);color:var(--neon)}
@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}.header,.sidebar,.notif,.level-up-overlay,#confetti{display:none!important}.main{margin-left:0!important;padding:20px!important}.lesson-card{break-inside:avoid;page-break-inside:avoid;margin-bottom:24px}}
.site-footer{text-align:center;padding:32px 0;margin-top:40px;border-top:1px solid var(--border);color:var(--text-dim);font-size:13px}.footer-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;font-weight:700;color:var(--text)}

.zoom-controls{position:fixed;bottom:16px;left:16px;display:flex;gap:4px;z-index:9999}
.zoom-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border,#2a3444);background:var(--bg2,#111827);color:var(--text,#d4dce8);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;line-height:1}
.zoom-btn:hover{border-color:var(--neon,#3b82f6);color:var(--neon,#3b82f6);transform:scale(1.1)}
.zoom-btn:focus-visible{outline:2px solid var(--neon,#3b82f6);outline-offset:2px}
.zoom-level{font-size:10px;position:absolute;top:-16px;left:50%;transform:translateX(-50%);color:var(--text-dim,#8899aa);white-space:nowrap;pointer-events:none}

/* A11y: Print improvements */
@media print{body{background:#fff!important;color:#000!important}.cert-overlay,.modal-overlay,.level-up-overlay,.theme-overlay,.zoom-controls{display:none!important}.lesson-card,.quiz-section,.boss-section,.interactive-area{break-inside:avoid;page-break-inside:avoid}}

/* Audio/Speech */
.tts-btn{background:none;border:none;cursor:pointer;font-size:.9em;opacity:.5;transition:all .2s;vertical-align:middle;margin-left:8px;padding:2px 6px;border-radius:4px}
.tts-btn:hover{opacity:1;background:var(--bg2)}.tts-btn.speaking{opacity:1;color:var(--neon);animation:tts-pulse 1s infinite}
@keyframes tts-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.tts-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin:8px 0;font-size:.8rem;flex-wrap:wrap}
.tts-bar select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.78rem}

<script>

// === Audio (TTS) ===
const _synth=window.speechSynthesis,_LANG='de-DE';let _ttsOn=false,_ttsRate=1,_ttsUtterance=null,_ttsQueue=[];
function speakLesson(i){if(_ttsOn){stopTTS();return}const c=document.querySelectorAll('.lesson-card');if(!c[i]||!_synth)return;stopTTS();_ttsStartChunked(c[i].innerText,_LANG);showTTSBar()}
function speakText(t,lang){if(!_synth)return;stopTTS();_ttsStartChunked(t,lang||_LANG)}
function stopTTS(){_ttsQueue=[];if(_synth){_synth.cancel()}_ttsOn=false;updTTSUI()}
function updTTSUI(){document.querySelectorAll('.tts-btn').forEach(b=>b.classList.toggle('speaking',_ttsOn))}
function setTTSRate(r){_ttsRate=parseFloat(r)}
function _ttsChunkText(text,maxWords){const sentences=text.replace(/([.!?])\s+/g,'$1\n').split('\n');const chunks=[];let cur=[];let wc=0;for(const s of sentences){const words=s.trim().split(/\s+/);if(wc+words.length>maxWords&&cur.length>0){chunks.push(cur.join(' '));cur=[];wc=0}cur.push(s.trim());wc+=words.length}if(cur.length>0)chunks.push(cur.join(' '));return chunks}
function _ttsStartChunked(text,lang){_ttsQueue=_ttsChunkText(text,80);_ttsPlayNext(lang)}
function _ttsPlayNext(lang){if(_ttsQueue.length===0){_ttsOn=false;updTTSUI();return}_ttsUtterance=new SpeechSynthesisUtterance(_ttsQueue.shift());_ttsUtterance.lang=lang;_ttsUtterance.rate=_ttsRate;_ttsUtterance.onstart=()=>{_ttsOn=true;updTTSUI()};_ttsUtterance.onend=()=>{setTimeout(()=>{_ttsPlayNext(lang)},250)};_ttsUtterance.onerror=(e)=>{if(e.error&&e.error!=="interrupted"&&e.error!=="canceled"){_ttsOn=false;_ttsQueue=[];updTTSUI()}else{setTimeout(()=>{_ttsPlayNext(lang)},250)}};_synth.speak(_ttsUtterance)}
function showTTSBar(){if(document.getElementById('ttsBar'))return;const mc=document.getElementById('moduleContent');if(!mc)return;const b=document.createElement('div');b.className='tts-bar';b.id='ttsBar';b.innerHTML='\u{1F50A} <select onchange="setTTSRate(this.value)"><option value="0.7">Langsam</option><option value="1" selected>Normal</option><option value="1.3">Schnell</option></select> <button onclick="stopTTS()">\u25A0 Stopp</button>';mc.prepend(b)}

// === Audio (STT) ===
const _SR=window.SpeechRecognition||window.webkitSpeechRecognition;let _rec=null,_recCB=null;
function initSR(){if(!_SR)return false;_rec=new _SR();_rec.lang=_LANG;_rec.continuous=false;_rec.interimResults=false;_rec.onresult=e=>{const t=e.results[0][0].transcript.toLowerCase().trim();if(_recCB)_recCB(t,e.results[0][0].confidence)};_rec.onerror=()=>{document.querySelectorAll('.mic-btn').forEach(b=>b.classList.remove('rec'))};_rec.onend=()=>{document.querySelectorAll('.mic-btn').forEach(b=>b.classList.remove('rec'))};return true}
function startSR(cb){if(!_rec&&!initSR()){cb(null,0);return}_recCB=cb;document.querySelectorAll('.mic-btn').forEach(b=>b.classList.add('rec'));try{_rec.start()}catch(e){cb(null,0)}}
let _spIdx=0,_spSen=[];
function initSpEx(m){const mod=modules[m];const d=document.createElement('div');d.innerHTML=mod.lessons.map(l=>l.content).join(' ');_spSen=d.textContent.split(/[.!?]+/).map(s=>s.trim()).filter(s=>s.length>15&&s.length<100).slice(0,5);_spIdx=0;renderSpEx()}
function renderSpEx(){const el=document.getElementById('speechExArea');if(!el)return;if(!_spSen.length){el.innerHTML='<p class="sr-na">Keine S\u00E4tze f\u00FCr Sprach\u00FCbung verf\u00FCgbar.</p>';return}const s=_spSen[_spIdx].replace(/"/g,'&quot;').replace(/'/g,'&#39;');el.innerHTML='<p style="font-size:1.05em;color:var(--neon);margin:10px 0;font-style:italic">&bdquo;'+_spSen[_spIdx]+'&ldquo;</p><div style="display:flex;justify-content:center;gap:16px;margin:12px 0"><button class="tts-btn" onclick="speakText(this.closest(\'.speech-ex\').querySelector(\'p\').textContent)" style="font-size:1.5em;opacity:1" title="Vorlesen">&#128266;</button>'+(_SR?'<button class="mic-btn" onclick="doSpCheck()" title="Nachsprechen">&#127908;</button>':'<p class="sr-na">Spracherkennung nicht verf\u00FCgbar.</p>')+'</div><div id="srRes"></div><div style="font-size:.78rem;color:var(--text-dim);margin-top:8px">Satz '+(_spIdx+1)+' von '+_spSen.length+'</div>'}
function doSpCheck(){const expected=_spSen[_spIdx].toLowerCase().replace(/[^a-z\u00e4\u00f6\u00fc\u00df\u00e9\u00e8\u00ea\u00e0 0-9]/g,'');startSR((spoken,conf)=>{const el=document.getElementById('srRes');if(!el)return;if(!spoken){el.innerHTML='<span class="sr-res retry">Nicht erkannt \u2014 nochmal versuchen</span>';return}const sim=calcSim(spoken.replace(/[^a-z\u00e4\u00f6\u00fc\u00df\u00e9\u00e8\u00ea\u00e0 0-9]/g,''),expected);if(sim>.45){el.innerHTML='<span class="sr-res good">\u2714 Gut! ('+Math.round(sim*100)+'%)</span>';_spIdx++;setTimeout(()=>{if(_spIdx<_spSen.length)renderSpEx();else{el.innerHTML='<span class="sr-res good">\u2714 Alle S\u00E4tze geschafft!</span>';if(typeof addXP==='function'&&typeof state!=='undefined'&&!state.interactiveResults['sp_'+state.currentModule]){state.interactiveResults['sp_'+state.currentModule]=true;addXP(30,'Sprach\u00FCbung');saveState()}}},1200)}else{el.innerHTML='<span class="sr-res retry">\u21BB Nochmal: &quot;'+spoken+'&quot;</span>'}})}
function calcSim(a,b){const wa=a.split(/\s+/).filter(Boolean),wb=b.split(/\s+/).filter(Boolean);if(!wa.length||!wb.length)return 0;let c=0;wa.forEach(w=>{if(wb.some(x=>x.includes(w)||w.includes(x)))c++});return c/Math.max(wa.length,wb.length)}


/* === Fortschritt-Export (TXT) === */
function exportFortschritt(){
  var t=document.title.replace(/\s*[\u2014\u2013|].*/,'').trim();
  var d=new Date();
  var dd=String(d.getDate()).padStart(2,'0');
  var mm=String(d.getMonth()+1).padStart(2,'0');
  var yyyy=d.getFullYear();
  var datum=dd+'.'+mm+'.'+yyyy;
  var datumFile=yyyy+'-'+mm+'-'+dd;

  var mc=state.modulesCompleted||[];
  var total=modules.length;
  var done=mc.length;

  var lvl=0;
  for(var i=LEVELS.length-1;i>=0;i--){if(state.xp>=LEVELS[i].xp){lvl=i;break;}}
  var lvlName=LEVELS[lvl]?LEVELS[lvl].name:'';

  var sep='\u2550'.repeat(42);
  var sep2='\u2500'.repeat(42);
  var lines=[];
  lines.push(sep);
  lines.push('  LERNFORTSCHRITT \u2014 '+t);
  lines.push(sep);
  lines.push('');
  lines.push('  Sch\u00FCler:   '+(state.name||'(kein Name)'));
  lines.push('  Datum:     '+datum);
  lines.push('  Level:     '+(lvl+1)+' \u2014 '+lvlName+' ('+state.xp+' XP)');
  lines.push('  Streak:    '+(state.streak||0)+' Tage in Folge');
  lines.push('');
  lines.push(sep2);
  lines.push('  MODULE ('+done+'/'+total+' abgeschlossen)');
  lines.push(sep2);
  lines.push('');

  for(var m=0;m<modules.length;m++){
    var mod=modules[m];
    var isDone=mc.indexOf(m)!==-1;
    var icon=isDone?'\u2705':'\u2B1C';
    var line='  '+icon+' Modul '+(m+1)+': '+mod.title;
    if(isDone){
      var qs=state.quizResults&&state.quizResults[m]!=null?state.quizResults[m]:'?';
      var bs=state.bossResults&&state.bossResults[m]!=null?state.bossResults[m]:'?';
      line+='\n        Quiz: '+qs+'/5 | Boss: '+bs+'/3';
    }
    lines.push(line);
  }

  var earnedBadges=(state.badges||[]);
  lines.push('');
  lines.push(sep2);
  lines.push('  ABZEICHEN ('+earnedBadges.length+'/'+BADGES.length+')');
  lines.push(sep2);
  lines.push('');
  if(earnedBadges.length===0){
    lines.push('  (noch keine)');
  }else{
    for(var b=0;b<BADGES.length;b++){
      if(earnedBadges.indexOf(BADGES[b].id)!==-1){
        lines.push('  '+BADGES[b].icon+' '+BADGES[b].name);
      }
    }
  }

  lines.push('');
  lines.push(sep);
  lines.push('  (c) 2026 GZ AI Stacks \u2014 Gerd Zimmermann');
  lines.push(sep);

  var txt=lines.join('\n');
  var safeName=(state.name||'Schueler').replace(/[^a-zA-Z0-9\u00C0-\u017F]/g,'_');
  var fileName='Fortschritt_'+t.replace(/[^a-zA-Z0-9\u00C0-\u017F]/g,'_')+'_'+safeName+'_'+datumFile+'.txt';
  var a=document.createElement('a');
  a.download=fileName;
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.click();
}

lessons:[
{title:'Wann verdoppeln wir Buchstaben?',content:`<p>Nach einem <strong>kurzen Vokal</strong> wird der folgende Konsonant oft <strong>verdoppelt</strong>:</p>
<div class="info-box">🔍 <strong>Regel:</strong> Kurzer Vokal → doppelter Konsonant<br>
Ba<strong>ll</strong> (kurzes a) · So<strong>nn</strong>e (kurzes o) · Mu<strong>tt</strong>er (kurzes u)<br>

<li>📖 B<strong>u</strong>ch (langes u) → nur ein c: Buch</li></ul>`},
{title:'Die wichtigsten Doppelungen',content:`<p>Diese Doppelungen kommen am häufigsten vor:</p>

<li><strong>nn</strong>: Sonne, können, Tanne, rennen</li>

function getLevel(xp){let lv=0;for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){lv=i;break}}return lv}
function getLevelProgress(xp){const lv=getLevel(xp);const cur=LEVELS[lv].xp;const next=lv<LEVELS.length-1?LEVELS[lv+1].xp:cur;if(next===cur)return 100;return Math.min(100,Math.round((xp-cur)/(next-cur)*100))}
function addXP(amount,reason){const old=getLevel(state.xp);state.xp+=amount;const nw=getLevel(state.xp);saveState();updateUI();showNotif('xp','+'+amount+' XP',reason);if(nw>old){state.level=nw;saveState();setTimeout(()=>showLevelUp(nw),800)}}
function updateStreak(){const today=new Date().toDateString();if(state.lastVisit===today)return;const yesterday=new Date(Date.now()-86400000).toDateString();if(state.lastVisit===yesterday){state.streak++;showNotif('streak','🔥 '+state.streak+' Tage Streak!','Weiter so!');if(state.streak>=3)awardBadge('streak3');if(state.streak>=7)awardBadge('streak7')}else if(state.lastVisit!==today){state.streak=1}state.lastVisit=today;saveState()}
function awardBadge(id){if(state.badges.includes(id))return;state.badges.push(id);saveState();const b=BADGES.find(x=>x.id===id);if(b)showNotif('badge',b.icon+' Badge: '+b.name,b.desc)}

function shuffleQuiz(modId,quiz){const key='m'+modId;if(state.quizShuffleMap[key])return state.quizShuffleMap[key];const idx=[...Array(quiz.length).keys()];for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]]}state.quizShuffleMap[key]=idx;saveState();return idx}
function renderQuiz(modId,quiz,isBoss){
  const pf=isBoss?'boss':'quiz';const idx=isBoss?[...Array(quiz.length).keys()]:shuffleQuiz(modId,quiz);
  let h='<div class="'+(isBoss?'boss-section':'quiz-section')+'">';
  h+=isBoss?'<h3>👑 Boss-Challenge</h3><p class="boss-sub">Alle '+quiz.length+' Fragen richtig beantworten!</p>':'<h3>📝 Quiz — Teste dein Wissen</h3>';
  idx.forEach((qi,di)=>{const q=quiz[qi];h+='<div class="quiz-q" data-qi="'+qi+'"><p>'+(di+1)+'. '+q.q+'</p>';q.a.forEach((a,ai)=>{h+='<label><input type="radio" name="'+pf+'_'+modId+'_'+qi+'" value="'+ai+'"> '+a+'</label>'});h+='</div>'});
  h+='<button class="quiz-submit" onclick="checkQuiz('+modId+','+isBoss+')">'+(isBoss?'Boss besiegen!':'Antworten prüfen')+'</button>';
  h+='<div class="quiz-result" id="'+pf+'Result'+modId+'" style="display:none"></div></div>';return h;
}
function checkQuiz(modId,isBoss){
  const pf=isBoss?'boss':'quiz';const quiz=isBoss?modules[modId].boss:modules[modId].quiz;
  let correct=0;const total=quiz.length;const startTime=window._quizStart||Date.now();
  quiz.forEach((q,qi)=>{
    const sel=document.querySelector('input[name="'+pf+'_'+modId+'_'+qi+'"]:checked');
    const labels=document.querySelectorAll('[data-qi="'+qi+'"] label');
    const ci=_d(q._h,qi);
    labels.forEach((l,li)=>{l.classList.remove('correct','wrong');if(li===ci)l.classList.add('correct');else if(sel&&parseInt(sel.value)===li)l.classList.add('wrong')});
    const qDiv=labels[0]?.closest('.quiz-q');if(qDiv){const old=qDiv.querySelector('.quiz-explanation');if(old)old.remove()}
    if(!sel||parseInt(sel.value)!==ci){if(qDiv){const exp=document.createElement('div');exp.className='quiz-explanation';exp.textContent='\u2192 Richtige Antwort: '+q.a[ci];qDiv.appendChild(exp)}}
    if(sel&&parseInt(sel.value)===ci)correct++;
  });
  const rEl=document.getElementById(pf+'Result'+modId);rEl.style.display='block';
  if(isBoss){
    if(correct===total){rEl.className='quiz-result pass';rEl.textContent='👑 Boss besiegt! '+correct+'/'+total+' — Perfekt!';if(!state.bossResults[modId]){state.bossResults[modId]=true;addXP(100,'Boss-Challenge bestanden!');if(!state.badges.includes('first_boss'))awardBadge('first_boss');if(modules.every((_,i)=>state.bossResults[i]))awardBadge('all_bosses');checkModuleComplete(modId)}}
    else{rEl.className='quiz-result fail';rEl.textContent='💀 '+correct+'/'+total+' — Alle müssen richtig sein! Versuch es nochmal.';setTimeout(()=>{document.querySelectorAll('input[name^="'+pf+'_'+modId+'"]').forEach(r=>{r.disabled=false;r.checked=false});document.querySelectorAll('[data-qi] label').forEach(l=>l.classList.remove('correct','wrong'));document.querySelectorAll('.quiz-explanation').forEach(e=>e.remove());rEl.style.display='none'},2000);return}
  }else{
    const passed=correct>=Math.ceil(total*0.6);rEl.className='quiz-result '+(passed?'pass':'fail');
    rEl.textContent=passed?'✅ '+correct+'/'+total+' richtig — Bestanden!':'❌ '+correct+'/'+total+' richtig — Mindestens '+Math.ceil(total*0.6)+' nötig.';
    if(passed&&!state.quizResults[modId]){state.quizResults[modId]=correct;addXP(correct*15+50,'Quiz bestanden ('+correct+'/'+total+')');if(!state.badges.includes('first_quiz'))awardBadge('first_quiz');if(correct===total)awardBadge('perfect_quiz');if(Date.now()-startTime<60000)awardBadge('speed_quiz');checkModuleComplete(modId)}
  }
  saveState();document.querySelectorAll('input[name^="'+pf+'_'+modId+'"]').forEach(r=>r.disabled=true);
  window.scrollTo({top:0,behavior:'smooth'});
}
function checkModuleComplete(modId){
  if(state.quizResults[modId]!==undefined&&state.bossResults[modId]&&!state.modulesCompleted.includes(modId)){
    state.modulesCompleted.push(modId);awardBadge('m'+modId);
    if(state.modulesCompleted.length>=5)awardBadge('half_done');
    if(state.modulesCompleted.length>=10){awardBadge('graduate');setTimeout(()=>showCert(),1500)}
    saveState();renderSidebar();
  }
}

// Modul 4: Konjugation
function initKonjugation(){
  const verbs=[{stem:'spiel',inf:'spielen'},{stem:'mal',inf:'malen'},{stem:'lern',inf:'lernen'}];
  const persons=['ich','du','er/sie/es','wir','ihr','sie'];
  const endings=['e','st','t','en','t','en'];
  let vIdx=0,score=0,total=0;const el=document.getElementById('interactiveContent');
  function render(){
    if(vIdx>=verbs.length){el.innerHTML='<div class="ix-feedback pass" style="display:block">🎉 '+score+'/'+total+' richtig! Konjugations-Held!</div>';if(!state.interactiveResults[4]){state.interactiveResults[4]=true;addXP(30,'Konjugation geschafft!');saveState()}return}
    const v=verbs[vIdx];
    el.innerHTML='<p style="font-size:20px;text-align:center;margin-bottom:16px">Konjugiere: <strong style="color:var(--neon)">'+v.inf+'</strong></p><div id="ixConj"></div><button class="ix-btn" onclick="checkConj()">Prüfen</button><div class="ix-feedback" id="ixFeedback"></div><p style="text-align:center;color:var(--text-dim);margin-top:8px">'+(vIdx+1)+'/'+verbs.length+'</p>';
    const container=document.getElementById('ixConj');
    persons.forEach((p,i)=>{const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:12px;margin:6px auto;max-width:350px';row.innerHTML='<span style="width:80px;text-align:right;color:var(--text-dim)">'+p+'</span><input type="text" data-pi="'+i+'" style="flex:1;padding:8px 12px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg2);color:var(--text);font-size:16px;font-family:var(--font)" placeholder="'+v.stem+'..." autocomplete="off">';container.appendChild(row)});
  }
  window.checkConj=()=>{
    const v=verbs[vIdx];let ok=0;
    persons.forEach((p,i)=>{const input=document.querySelector('[data-pi="'+i+'"]');const correct=v.stem+endings[i];total++;if(input.value.trim().toLowerCase()===correct){ok++;score++;input.style.borderColor='var(--success)'}else{input.style.borderColor='var(--danger)';input.value=correct;input.style.color='var(--danger)'}});
    vIdx++;setTimeout(render,2000);
  };
  render();
}

  const container=document.getElementById('ixText');
  words.forEach((w,i)=>{const sp=document.createElement('span');sp.className='ix-mark';sp.textContent=w.w;sp.dataset.idx=i;sp.onclick=()=>sp.classList.toggle('selected');container.appendChild(sp);if(i===5||i===10)container.appendChild(document.createTextNode('. '));else container.appendChild(document.createTextNode(' '))});

}

<script>
(function(){
var KEY=null;
var scripts=document.querySelectorAll('script');
for(var i=0;i<scripts.length;i++){
var km=scripts[i].textContent.match(/STORAGE_KEY\s*=\s*['"](\w+)['"]/);
if(km){KEY=km[1];break;}
}
if(!location.hash.match(/modules=/)){try{Object.keys(localStorage).filter(function(k){return k.indexOf("_allowed_modules")!==-1}).forEach(function(k){localStorage.removeItem(k)})}catch(e){}}
var LOCK_KEY=(KEY||'app')+'_allowed_modules';
var h=location.hash.match(/modules=([0-9,]+)/);
var allowed=null;
if(h){
allowed=h[1].split(",").map(Number);
try{localStorage.setItem(LOCK_KEY,JSON.stringify(allowed));}catch(e){}
}else{
try{var stored=localStorage.getItem(LOCK_KEY);if(stored)allowed=JSON.parse(stored);}catch(e){}
}
if(!allowed||!allowed.length)return;
function filterSidebar(){
var items=document.querySelectorAll("#sidebarModules > *");
for(var i=0;i<items.length;i++){
items[i].style.display=(allowed.indexOf(i)===-1)?"none":"";
}
}
var sb=document.getElementById("sidebarModules");
if(sb){new MutationObserver(filterSidebar).observe(sb,{childList:true});filterSidebar();}
document.addEventListener("click",function(e){
var t=e.target.closest("[onclick]");
if(!t)return;
var oc=t.getAttribute("onclick")||"";
var idx=oc.indexOf("renderModule(");
if(idx===-1)return;
var num=parseInt(oc.substring(idx+13));
if(!isNaN(num)&&allowed.indexOf(num)===-1){e.preventDefault();e.stopImmediatePropagation();}
},true);
setTimeout(filterSidebar,500);
window.addEventListener("hashchange",function(){
var hh=location.hash.match(/modules=([0-9,]+)/);
if(hh){
allowed=hh[1].split(",").map(Number);
try{localStorage.setItem(LOCK_KEY,JSON.stringify(allowed));}catch(e){}
filterSidebar();
}
});
})();
</script>

<script>
(function(){
var zl=100;
function applyZoom(){document.body.style.zoom=zl/100;var e=document.getElementById('zoomLvl');if(e)e.textContent=zl+'%';}
window.zoomIn=function(){if(zl<200){zl+=10;applyZoom();}};
window.zoomOut=function(){if(zl>50){zl-=10;applyZoom();}};
window.zoomReset=function(){zl=100;applyZoom();};
document.addEventListener('keydown',function(e){
if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
if((e.key==='+'||e.key==='=')&&!e.ctrlKey&&!e.metaKey){e.preventDefault();zoomIn();}
else if((e.key==='-'||e.key==='_')&&!e.ctrlKey&&!e.metaKey){e.preventDefault();zoomOut();}
else if(e.key==='0'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();zoomReset();}
});
})();
</script>

<script>
/* A11y: Focus trap for modal overlays */
document.addEventListener('keydown',function(e){if(e.key==='Tab'){var ov=document.querySelector('.cert-overlay.active,.modal-overlay.active,[role="dialog"].active');if(ov){var fc=ov.querySelectorAll('button,a,[tabindex="0"],input,select,textarea');if(fc.length){var f=fc[0],l=fc[fc.length-1];if(e.shiftKey&&document.activeElement===f){e.preventDefault();l.focus()}else if(!e.shiftKey&&document.activeElement===l){e.preventDefault();f.focus()}}}}});
</script>
</body>
</html>
